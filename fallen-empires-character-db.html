, or any Active Skill is used. Flavor determined by Schools (Evocation = classical elements, Spirit = Spirit).'},{id:"mage_cancel_magic",name:"Cancel Magic",spCost:6,maxPurchases:1,description:"End the duration of any spell encountered. Time based on duration: minutes = 1 min concentration; hours = 10 min; days/lasting = 1 hour."},{id:"mage_chain_spell",name:"Chain Spell",spCost:4,maxPurchases:5,description:'Deliver one beneficial spell to one extra target per rank. With 5 ranks: cast on 6 total targets. Successive targets called as "Chain Spell <Effect Name>".'},{id:"mage_define_magic",name:"Define Magic",spCost:5,maxPurchases:1,description:"Used on a magic item: reveals all magical properties, how to use them, and the item itself. Does not reveal if an item is cursed."},{id:"mage_arcane_volley",name:"Arcane Volley",spCost:8,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] On a module: all enemies in the next encounter take 20 points of damage in a chosen flavor. Must have Spell Pool matching the flavor. Can trigger vulnerabilities/resistances; will not trigger defenses."},{id:"mage_mirror_image",name:"Mirror Image",spCost:4,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] Gain two uses of Resist Physical that must be used on the next two physical attacks."},{id:"mage_create_familiar",name:"Create Familiar",spCost:5,maxPurchases:1,isAdvanced:!0,prerequisite:"Elemental School",description:"Manifest raw energy into a tiny Quasit familiar. Choose flavor at check-in (Fire/Water/Wind/Stone). Remains invisible unless chosen otherwise. Can perform simple non-combat tasks. While summoned: gain Resist <Flavor> once per reset matching the familiar."},{id:"mage_create_phylactery",name:"Create Phylactery",spCost:5,maxPurchases:1,isAdvanced:!0,prerequisite:"Spirit School",description:"Scribe glyphs that hang invisibly around the character. Gain Resist Shadow or Resist Disease (Rot, Plague, Wound, Vampiric) once per reset."}]},P=[{id:"nov_daily_toil",name:"Daily Toil",spCost:3,maxPurchases:1,description:"Carry up to 30 extra Ghost Tags following normal Ghost Tag rules."},{id:"nov_find_flower",name:"Find a Flower",spCost:4,maxPurchases:1,description:"Functions like Farming, but only on modules and encounters. Find minor Herb Components."},{id:"nov_find_rock",name:"Find a Rock",spCost:4,maxPurchases:1,description:"Functions like Mining, but only on modules and encounters. Find minor Ore Components."},{id:"nov_find_shiny",name:"Find a Shiny",spCost:4,maxPurchases:1,description:"Functions like Theurgist, but only on modules and encounters. Find minor Residuum Components."},{id:"nov_improved_aid",name:"Improved Aid",spCost:3,maxPurchases:1,description:"Stabilize a dying creature with a 60-second counted action (count stops bleeding but target not stable until count completes). Also: ask status questions within arm's reach: Dying, Dead, Conscious, Unconscious, Diseased, Stunned, Sleeping, How much Body are you down?"},{id:"nov_novice_brewing",name:"Novice Brewing",spCost:5,maxPurchases:1,description:"Craft up to Rank 2 items in 5 minutes without recipes. Needs components and Novice-shop access."},{id:"nov_novice_chemist",name:"Novice Chemist",spCost:5,maxPurchases:1,description:"Craft up to Rank 2 items in 5 minutes without recipes. Needs components and Novice-shop access."},{id:"nov_novice_cook",name:"Novice Cook",spCost:5,maxPurchases:1,description:"Craft up to Rank 2 items in 5 minutes without recipes. Needs components and Novice-shop access."},{id:"nov_novice_engineer",name:"Novice Engineer",spCost:5,maxPurchases:1,description:"Craft up to Rank 2 items in 5 minutes without recipes. Needs components and Novice-shop access."},{id:"nov_novice_smith",name:"Novice Smith",spCost:5,maxPurchases:1,description:"Craft up to Rank 2 items in 5 minutes without recipes. Needs components and Novice-shop access."},{id:"nov_pet_taming",name:"Pet Taming",spCost:4,maxPurchases:"unlimited",description:"Capture and tame 1 wild animal at a time as a companion pet (requires Power: Companion to keep). Cannot tame a new pet while housing a current one (must release first). Pet types: Stamina (Escape from Binding 1/reset), Intellect (cast Magic <Spell> up to 3rd level 1/reset), Dexterity (Flee 1/reset), Cunning (Play Dead 1/reset)."},{id:"nov_ritual_apprentice",name:"Ritual Apprentice",spCost:6,maxPurchases:1,prerequisite:"Well Educated",description:"Aid in a ritual cast by a full character, reducing the time by 5 minutes (minimum 1 minute). May cause the ritual to flux as normal."},{id:"nov_team_mascot",name:"Team Mascot",spCost:4,maxPurchases:"unlimited",description:'Once per module/encounter/10 min: "All allies in the sound of my voice, heal 3 body". May be purchased multiple times but not used more than once per encounter or every 10 minutes.'},{id:"nov_run_for_help",name:"Run for Help",spCost:3,maxPurchases:"unlimited",description:"Natural Flee once per reset. Only to leave an encounter, not to pursue."},{id:"nov_cant_catch_me",name:"Can't Catch Me!",spCost:4,maxPurchases:1,prerequisite:"Run for Help",description:"When fleeing with Flee effect, enemies cannot counter or pursue the novice."},{id:"nov_swimming_lessons",name:"Swimming Lessons",spCost:4,maxPurchases:1,description:"Move through Aquatic Terrain without penalty."},{id:"nov_beginner_luck",name:"Beginner's Luck",spCost:6,maxPurchases:1,prerequisite:"Any Novice harvesting skill (Find a Flower, Find a Rock, or Find a Shiny)",description:"When harvesting a node with more than one draw, return one pulled stick to the node and draw a new stick. Must keep the new draw."},{id:"nov_lets_trade",name:"Let's Trade!",spCost:6,maxPurchases:1,description:"Trade components and coins (only) as Merchant rank 1. Once per reset, capped at 30 common components value."},{id:"nov_outdoor_skills",name:"Outdoor Skills",spCost:3,maxPurchases:1,description:"Functions as the Survival skill, except cannot be used to make a weapon. Tools may still be made."},{id:"nov_wake_up",name:"Wake Up!",spCost:5,maxPurchases:"unlimited",description:'Once per module/encounter/10 min: target ally within 5 ft — "Voice natural Awaken".'},{id:"nov_you_not_so_big",name:"You're Not So Big",spCost:5,maxPurchases:"unlimited",description:'Once per module/encounter/10 min: target enemy within 5 ft — "Voice natural Weakness".'},{id:"nov_trained_helper",name:"Trained Helper",spCost:3,maxPurchases:1,description:"Reduce another player's craft time by up to 4 minutes when helping them craft."},{id:"nov_well_educated",name:"Well Educated",spCost:3,maxPurchases:1,description:"Functions as Rank 2 Common Knowledge for marshal information."},{id:"nov_footprint_follower",name:"Footprint Follower",spCost:3,maxPurchases:1,description:"Harvest from tracking (hunting) nodes. May also aid a player who is tracking, granting them +1 success on their Contested Roll."},{id:"nov_pocket_sand",name:"Pocket Sand",spCost:5,maxPurchases:"unlimited",description:'Once per module/encounter/10 min: target enemy within 5 ft — "Voice natural Blind".'}],N=[{level:1,slotType:"regular",tier:"normal"},{level:4,slotType:"regular",tier:"normal"},{level:8,slotType:"regular",tier:"normal"},{level:10,slotType:"species",tier:"normal"},{level:12,slotType:"regular",tier:"normal"},{level:16,slotType:"regular",tier:"normal"},{level:20,slotType:"regular",tier:"heroic"},{level:20,slotType:"species",tier:"heroic"},{level:24,slotType:"regular",tier:"heroic"},{level:28,slotType:"regular",tier:"heroic"},{level:30,slotType:"species",tier:"heroic"},{level:32,slotType:"regular",tier:"heroic"},{level:36,slotType:"regular",tier:"heroic"},{level:40,slotType:"regular",tier:"heroic"},{level:40,slotType:"species",tier:"heroic"}],E=[{id:"acrobatics",name:"Acrobatics",tier:"normal",category:"everyman",prerequisite:"Dodge",description:"Whenever the character uses a skill from their Defensive tree they gain a Barrier effect. Points do not stack with themselves and are the first to be lost."},{id:"ambidexterity",name:"Ambidexterity",tier:"normal",category:"everyman",description:"Can move Focus and Precision bonus damage to either hand (5 counted action). While wielding a weapon in each hand, flurry limit increases by 1 (to 4)."},{id:"amp",name:"Amp",tier:"normal",category:"class",qualifyingClasses:["bard"],prerequisite:"Bard",description:"When wielding an instrument weapon, Base Weapon Damage is increased by 1 point."},{id:"amplify_barrier",name:"Amplify Barrier",tier:"normal",category:"class",qualifyingClasses:["spellblade"],prerequisite:"Spellblade",description:"Barrier skill now absorbs 40 points of damage instead of the normal 20."},{id:"animal_speech",name:"Animal Speech",tier:"normal",category:"class",qualifyingClasses:["caller"],prerequisite:"Caller",description:"Allows the character to talk normally while shape changed and communicate with animals of similar breed. Does not allow spell casting or activating magic items requiring speech."},{id:"arcane_study",name:"Arcane Study",tier:"normal",category:"class",qualifyingClasses:["spellblade","caller","paladin","mage"],prerequisite:"Spell Devotion",affectsSpellPool:!0,spellPoolBonus:10,description:"Increases the character's Spell Pool by 10 points."},{id:"armor_efficiency",name:"Armor Efficiency",tier:"normal",category:"everyman",prerequisite:"Armor Proficiency",description:"Increases armor gained from a phys-rep by 1 tier (e.g. Medium becomes Heavy). Still limited to class maximum armor value."},{id:"armor_proficiency",name:"Armor Proficiency",tier:"normal",category:"everyman",description:"Increases maximum armor a character can wear by 1 Tier."},{id:"aspect_mastery",name:"Aspect Mastery",tier:"normal",category:"class",qualifyingClasses:["caller"],prerequisite:"Caller",description:"Aspects cast by the player have their duration doubled."},{id:"athletics",name:"Athletics",tier:"normal",category:"everyman",repeatable:!0,description:"Increases Base Strength by +2 for Feats of Strength. Stacks with itself."},{id:"blindsense",name:"Blindsense",tier:"normal",category:"species",qualifyingSpecies:["deep_elf"],prerequisite:"Deep Elf",description:"Take no negative from the Blind effect. Do not suffer penalties on Contested Rolls for darkness or lack of vision."},{id:"born_grappler",name:"Born Grappler",tier:"normal",category:"species",qualifyingSpecies:["half_troll"],repeatable:!0,prerequisite:"Half-Troll and Lengthen Claws",description:"Twice each reset: use Binding Strike with a 6 counted action reducing target to -1 BP. Only with claws. Counts as +4 Base Strength for Break Free."},{id:"born_marksman",name:"Born Marksman",tier:"normal",category:"class",qualifyingClasses:["ranger"],repeatable:!0,prerequisite:"Ranger",description:"Each reset gain 2 additional uses of the Hunter's Mark skill."},{id:"born_to_serve",name:"Born to Serve",tier:"normal",category:"species",qualifyingSpecies:["deep_dwarf","hill_dwarf","mountain_dwarf"],repeatable:!0,prerequisite:"Oathbound",description:"Twice each reset: Resist effects that push or force movement (Repel, Sweep, etc.)."},{id:"born_trader",name:"Born Trader",tier:"normal",category:"species",qualifyingSpecies:["felis"],prerequisite:"Felis",description:"Counts as one level higher Rank of Merchant than purchased, max 6."},{id:"broaden_specialization",name:"Broaden Specialization",tier:"normal",category:"everyman",prerequisite:"Specialization",description:"Allows the character to apply their Specialization bonus to all weapons they are proficient with."},{id:"bulwark",name:"Bulwark",tier:"normal",category:"class",qualifyingClasses:["champion"],prerequisite:"Strong Arm",description:"Can now block any attack with the Elemental vector with their shield (or via Deflect/Parry where applicable)."},{id:"call_the_beast",name:"Call the Beast",tier:"normal",category:"species",qualifyingSpecies:["rok_shen"],repeatable:!0,prerequisite:"Rok'Shen",description:"Once each reset: large/powerful animal types gain +4 Base Strength for 10 minutes; smaller/agile types take Reduced: Half damage for the duration."},{id:"call_the_wild",name:"Call the Wild",tier:"normal",category:"class",qualifyingClasses:["guardian"],repeatable:!0,prerequisite:"Guardian",description:"Once each reset: grant up to 5 targets a totem."},{id:"called_shot",name:"Called Shot",tier:"normal",category:"class",qualifyingClasses:["ranger"],prerequisite:"Ranger",description:"When using Hunter's Mark to deal damage only (no Technique), receive +10 Base Weapon Damage instead of normal +5."},{id:"clean_getaway",name:"Clean Getaway",tier:"normal",category:"class",qualifyingClasses:["rogue"],prerequisite:"Rogue",description:"In urban settings, add Rogue level in failures to Tracking attempts against you (alone), or half level rounded up (with others)."},{id:"combat_archery",name:"Combat Archery",tier:"normal",category:"everyman",prerequisite:"Precision +4",description:"Can block with a bow even single-handed. After a bow is hit by a weapon it must be restrung on a 3 counted action before firing."},{id:"combat_medic",name:"Combat Medic",tier:"normal",category:"everyman",prerequisite:"Diagnose",description:"Can perform First Aid on two targets simultaneously, so long as both are within arm's reach."},{id:"companion",name:"Companion",tier:"normal",category:"everyman",description:"Allows the character to have a Tamed pet. Gain chosen benefit from the pet's list. Only 1 pet at a time."},{id:"conduit",name:"Conduit",tier:"normal",category:"class",qualifyingClasses:["spellblade"],repeatable:!0,prerequisite:"Spellblade",description:"Allows use of the Channel Class Feature two additional times each reset."},{id:"corner_of_your_eye",name:"Corner of Your Eye",tier:"normal",category:"species",qualifyingSpecies:["pixie"],prerequisite:"Pixie",description:"Buy Hide skill for 6 SP. Use Conceal once a day (no energy cost, Essence or Prime plane only)."},{id:"create_wondrous_item",name:"Create Wondrous Item",tier:"normal",category:"everyman",prerequisite:"Knowledge (Magic) 3 and Character level 4",description:"Use Create Wondrous Item recipes to craft items more interesting than standard equipment but below ritually empowered magic items."},{id:"critical_strike",name:"Critical Strike",tier:"normal",category:"everyman",prerequisite:"Blitz or Overpower",description:"When using Blitz, Slay Strike or Overpower, add the Critical Modifier to the damage call."},{id:"decompose",name:"Decompose",tier:"normal",category:"species",qualifyingSpecies:["myconid"],prerequisite:"Myconid",description:"Stay in contact with a naturally-decaying corpse for 1 minute: regain up to 4 BP (or regenerate one body part). Completely destroys the body. Larger creatures may temporarily increase Max Body for 1 hour (plot discretion)."},{id:"deep_pockets",name:"Deep Pockets",tier:"normal",category:"everyman",description:"Carry double the number of Ghost Tags as normally allowed, including doubling value from items like Bags of Holding."},{id:"defender",name:"Defender",tier:"normal",category:"class",qualifyingClasses:["champion"],prerequisite:"Champion",description:"Use the Defend skill 1 additional time each Encounter. Can use Weapon Ward to protect others within weapons reach."},{id:"defense_is_good_offense",name:"Defense is Good Offense",tier:"normal",category:"class",qualifyingClasses:["champion"],prerequisite:"Champion",description:"Twice daily for free: use Blitz + Critical Strike (4 swings of +5 temporary weapon damage adding the Critical Modifier)."},{id:"desperate_rush",name:"Desperate Rush",tier:"normal",category:"class",qualifyingClasses:["paladin"],repeatable:!0,prerequisite:"Paladin",description:"Removes the 60-second cast time from a Paladin's Life spell, twice per reset."},{id:"devotion",name:"Devotion",tier:"normal",category:"everyman",prerequisite:"Must be part of an Attunement",description:"Grants 6 Favor with the selected Attunement. Once chosen, cannot be removed by Obliterate Mind or similar effects."},{id:"element_exclusion",name:"Element Exclusion",tier:"normal",category:"class",qualifyingClasses:["mage","spellblade"],prerequisite:"Mage or Spellblade",affectsSpellPool:!0,spellPoolBonus:15,description:"Increases Spell Pool by 15 points and Spell Cap by 5, but the character can no longer cast one chosen Element (Fire, Water, Stone, or Wind)."},{id:"elemental_modality",name:"Elemental Modality",tier:"normal",category:"class",qualifyingClasses:["mage"],prerequisite:"Elemental Duplication, Mage",description:"Once per encounter: throw a spell or spell pool attack with the Elemental vector."},{id:"elven_accuracy",name:"Elven Accuracy",tier:"normal",category:"species",qualifyingSpecies:["high_elf"],repeatable:!0,prerequisite:"High Elf",description:'When a Mana/Energy skill or spell misses or is defended against, call "Elven Accuracy" and repeat immediately at no extra cost. Twice each reset.'},{id:"elven_martial_training",name:"Elven Martial Training",tier:"normal",category:"species",qualifyingSpecies:["high_elf"],prerequisite:"High Elf",description:"Grants Weapon Proficiency: Long Bow & Long Sword."},{id:"enchant_element",name:"Enchant Element",tier:"normal",category:"class",qualifyingClasses:["spellblade"],prerequisite:"Spellblade, Aura Blade",description:"Enchant weapon with one elemental flavor (Fire, Stone, Water, Wind) instead of Magic when using Aura Blade."},{id:"enchant_spirit",name:"Enchant Spirit",tier:"normal",category:"class",qualifyingClasses:["paladin"],prerequisite:"Paladin, Aura Blade",description:"Enchant weapon with the Flavor Carrier: Spirit instead of Magic when using Aura Blade."},{id:"endless_fury",name:"Endless Fury",tier:"normal",category:"class",qualifyingClasses:["guardian"],repeatable:!0,prerequisite:"Guardian",description:"Activates Primal Fury Class Feature 2 additional times each reset."},{id:"energy_resistance",name:"Energy Resistance",tier:"normal",category:"everyman",repeatable:!0,prerequisite:"8th Character Level",description:"Negates first 5 points of any non-weapon delivered attack with chosen flavor (Fire, Water, Wind, or Stone). Different flavor must be chosen each time taken; effects do not stack."},{id:"enhanced_shifting",name:"Enhanced Shifting",tier:"normal",category:"class",qualifyingClasses:["caller"],prerequisite:"Caller",description:"When using Shift, Caller may now Fly, Swim (with underwater breathing), or Burrow. Short Claws received when shifting become Medium Claws."},{id:"enhanced_reclamation",name:"Enhanced Reclamation",tier:"normal",category:"class",qualifyingClasses:["mage"],repeatable:!0,prerequisite:"Mage",description:"Use the Reclamation ability two more times per reset."},{id:"entmoot",name:"Entmoot",tier:"normal",category:"species",qualifyingSpecies:["ent"],prerequisite:"One with the Land",description:"Requires at least 3 Ents with this power. 15 minutes of concentration in a circle. At the end the Ents may ask a question of the world. Inform Plot as soon as possible."},{id:"extended_martial_training",name:"Extended Martial Training",tier:"normal",category:"class",qualifyingClasses:["monk"],prerequisite:"Monk",description:"Treat all Class Weapon Proficiencies as Brawl weapons."},{id:"eye_for_quality",name:"Eye for Quality",tier:"normal",category:"everyman",description:"When harvesting Owned Nodes, receive 20% more harvesting points. When harvesting wild nodes, may re-roll one pulled stick (set aside, pull new one, return original)."},{id:"family_weapon",name:"Family Weapon",tier:"normal",category:"species",qualifyingSpecies:["deep_dwarf","hill_dwarf","mountain_dwarf"],prerequisite:"Oathbound",description:"A masterfully crafted Axe, Hammer, or Spear passed down through ages. Immune to Broken status effects. Cannot be Disarmed while wielding it. Effects added to it carry their own expirations."},{id:"fast_learner",name:"Fast Learner",tier:"normal",category:"everyman",description:"In addition to Basic Class skills, can also learn Basic Everyman skills without need of an instructor."},{id:"favored_enemy",name:"Favored Enemy",tier:"normal",category:"everyman",repeatable:!0,prerequisite:"Knowledge (Area) Rank 3",description:"Bane effect (+5 Temporary Weapon Damage) against chosen creature type, OR +5 to Spell Pool attacks of 10+ points against them. Choose from: Nature (Animal/Plants), Cycle (Undead/Abominations), Magic (Shapechangers/Dragons/Golems), Planes (Outsiders/Elementals), Species (needs Rank 3 Knowledge of target species). Paladins may also choose types of evil-doers."},{id:"fearless_fury",name:"Fearless Fury",tier:"normal",category:"class",qualifyingClasses:["guardian"],prerequisite:"Guardian",description:"While Primal Fury is active, additionally gain Immunity to Command, Fear, Feeblemind, and Slumber."},{id:"fey_blooded",name:"Fey Blooded",tier:"normal",category:"species",qualifyingSpecies:["fae_troll","kitsune","pixie","satyr","sidhe","sluagh","gnome"],prerequisite:"Any Fey Species",description:"Once each reset: cancel all magical effects currently on self; for 1 minute become Immune to all magical effects (positive and negative). While active: Vulnerable: Iron."},{id:"fey_lineage",name:"Fey Lineage",tier:"normal",category:"species",qualifyingSpecies:["gnome"],prerequisite:"Gnome",description:"Can sometimes see bits of the Fey world. See weak points in the barrier between worlds and identify fey portals. Can discern if a target is Fey by studying them."},{id:"fight_to_the_death",name:"Fight to the Death",tier:"normal",category:"everyman",prerequisite:"Adrenaline Rush x2",description:"When reduced to -1 BP, may instantly heal for 16 BP. For the following hour, bleed-out count reduced from 120 to 60 seconds. Twice each reset."},{id:"flap_your_wings",name:"Flap Your Wings",tier:"normal",category:"species",qualifyingSpecies:["pixie"],prerequisite:"Pixie",description:'Use "Glitterdust" per the Nature spell twice per reset.'},{id:"flit_and_flutter",name:"Flit and Flutter",tier:"normal",category:"species",qualifyingSpecies:["pixie"],repeatable:!0,prerequisite:"Pixie",description:"Gain two uses of Flee per reset. May not be used to flee into combat. Can be purchased multiple times."},{id:"florentine",name:"Florentine",tier:"normal",category:"everyman",description:"Wield any 1-handed weapon in main hand and up to a medium weapon in off hand."},{id:"follower",name:"Follower",tier:"normal",category:"everyman",prerequisite:"8th Character Level",description:"Gain a follower with: 4 Ranks Craftsman, Knowledge (Geography) Rank 2, Knowledge (History) Rank 1, Talented Assistant Power, and Local Power."},{id:"gnomish_talent",name:"Gnomish Talent",tier:"normal",category:"species",qualifyingSpecies:["gnome"],prerequisite:"Gnome",description:"Can attempt Disable Device without ranks (minimum +2 Bonus). If 5+ ranks, always treated as having 5 more ranks for Contested Rolls."},{id:"harden_skin",name:"Harden Skin",tier:"normal",category:"species",qualifyingSpecies:["ent"],prerequisite:"Ent",description:"Gain 10 points of natural armor that stack with other armor and allow the character to exceed class maximum armor by 10 points."},{id:"improved_concentration",name:"Improved Concentration",tier:"normal",category:"everyman",description:"Immune to Cheap Shot. While using a skill requiring Concentration, taking damage will not interrupt. Allows refit of Dexterity or Natural armor without being interrupted by damage."},{id:"improved_familiar",name:"Improved Familiar",tier:"normal",category:"class",qualifyingClasses:["mage"],prerequisite:"Create Familiar",affectsSpellPool:!0,spellPoolBonus:5,description:"Manifest a more powerful Familiar granting 5 Spell Pool plus a flavor-based benefit (Fire: +5 SP, Water: +5 Spell Cap, Wind: Evade once/reset, Stone: +5 Base BP)."},{id:"improved_phylactery",name:"Improved Phylactery",tier:"normal",category:"class",qualifyingClasses:["mage"],prerequisite:"Create Phylactery",description:"Manifest a more powerful Phylactery with a glyph-based benefit (Grace: lower SP reset time by 1 min, Angelus: +5 Armor over max, Mending: auto-heal 5 at last 5s of bleed-out, Glory: next Dispel/Protective/Healing costs 7 less mana after Life spell)."},{id:"improved_species_resist_magic",name:"Improved Species, Resist Magic",tier:"normal",category:"species",qualifyingSpecies:["deep_elf","deep_dwarf"],prerequisite:"Deep Elf or Deep Dwarf",description:"Species Resist Magic abilities (earned from levels, not purchased with SP) can also be used to resist attacks with the Arcane Delivery Type."},{id:"inner_light",name:"Inner Light",tier:"normal",category:"class",qualifyingClasses:["mage"],prerequisite:"School of Spirit",description:"Twice each reset, for 1 combat or 5 minutes: grants Magic Vector for all Spirit spells AND doubles Spell Pool (can exceed cap). While active: Spell Pool becomes Touch Cast only."},{id:"iron_will",name:"Iron Will",tier:"normal",category:"everyman",repeatable:!0,description:"Shrug off a mental attack. Twice each reset."},{id:"kintsugi_barrier",name:"Kintsugi Barrier",tier:"normal",category:"class",qualifyingClasses:["spellblade"],prerequisite:"Spellblade",description:"Spellblade's armor is refit upon use of their Barrier skill."},{id:"lancet",name:"Lancet",tier:"normal",category:"class",qualifyingClasses:["spellblade"],prerequisite:"Spellblade",description:"Can throw Spell Pool with packets instead of only delivering via weapon. Follows standard rules for Spell Pool."},{id:"lead_rain",name:"Lead Rain",tier:"normal",category:"class",qualifyingClasses:["gunslinger"],prerequisite:"Gunslinger",description:'Once per reset: Fan the Hammer against all present targets. Changes call from "Voice <target> <damage>" to "All Enemies, <damage>".'},{id:"lengthen_claws",name:"Lengthen Claws",tier:"normal",category:"species",qualifyingSpecies:["felis","rok_shen","fae_troll","half_troll"],prerequisite:"Short Claws",description:"Character's claws become elongated up to Medium weapon length."},{id:"lightning_reflexes",name:"Lightning Reflexes",tier:"normal",category:"everyman",description:"When caught in the area of a trap or limited AOE, if within 1 step of the radius, can step out and avoid the attack."},{id:"limb_breaker",name:"Limb Breaker",tier:"normal",category:"class",qualifyingClasses:["warrior"],prerequisite:"Warrior",description:"Unlocks purchase of Maim Limb skill for 6 SP. Each use costs 3 Energy."},{id:"limber_form",name:"Limber Form",tier:"normal",category:"species",qualifyingSpecies:["rok_shen"],prerequisite:"Rok'Shen",description:"On a 60 counted action: break free from Pin, Bind, and Web effects plus non-magical bindings. Can squeeze through narrow openings."},{id:"living_armor",name:"Living Armor",tier:"normal",category:"class",qualifyingClasses:["mage"],prerequisite:"School of Spirit",description:'Use Spell Pool (Healing) to fix armor with altered incant "I Summon X Armor." Can heal Body Points or Armor Points. Healing armor to max value Repairs it. Useable on Dexterity Armor.'},{id:"lock_expert",name:"Lock Expert",tier:"normal",category:"class",qualifyingClasses:["rogue"],prerequisite:"Rogue",description:"Twice per reset: automatically succeed on a disable device attempt for any lock with at least 20% chance once modifiers are applied."},{id:"longshot",name:"Longshot",tier:"normal",category:"class",qualifyingClasses:["gunslinger"],prerequisite:"Gunslinger",description:"Reduces Grit cost by one for any Rifle shot taken at 20 feet or farther. Applies on hit, not on intent."},{id:"magic_staff",name:"Magic Staff",tier:"normal",category:"everyman",prerequisite:"One-Hand Block",description:"Use a Staff as a wand rep instead of a Short Blunt. May also control some powerful magical objects (subject to marshal discretion)."},{id:"magical_training",name:"Magical Training",tier:"normal",category:"everyman",prerequisite:"Non-Magic Class",description:"Choose a School of magic (Elemental, Spirit, or Nature; not Paladin/Spellblade/Void). Can use Scrolls from that School up to 6th level. Cannot be changed once chosen."},{id:"main_gauche",name:"Main Gauche",tier:"normal",category:"everyman",prerequisite:"Florentine",description:"While fighting with two weapons: when using a Defensive Technique skill, gain +5 Temporary Weapon Damage as Blade effect on next off-hand attack (same encounter)."},{id:"make_it_work",name:"Make it Work",tier:"normal",category:"species",qualifyingSpecies:["gnome"],repeatable:!0,prerequisite:"Gnomish Talent",description:"Once each reset: use any Engineering item even without the normal skill (setting/disarming traps, throwing bombs, solving physical puzzles)."},{id:"martial_style",name:"Martial Style",tier:"normal",category:"class",qualifyingClasses:["monk"],prerequisite:"Monk, 4th Character Level",description:"Choose a style: Mantis Style (+1 swing to Flurry), Crane Style (+10 Dexterity Armor), or Bull Style (+1 Base Weapon Damage with Brawl weapons)."},{id:"master_craftsman",name:"Master Craftsman",tier:"normal",category:"everyman",prerequisite:"An Advanced Production Skill",description:"Produce two identical items at the same time when creating goods in-game. Still pay Component price for both."},{id:"master_of_the_wilds",name:"Master of the Wilds",tier:"normal",category:"class",qualifyingClasses:["caller"],prerequisite:"Caller",description:"Now affect 2 additional targets when casting Aspects."},{id:"master_smithing",name:"Master Smithing",tier:"normal",category:"species",qualifyingSpecies:["deep_dwarf","hill_dwarf","mountain_dwarf"],prerequisite:"Dwarf and Advanced Smithing",description:"All weapons made automatically receive 1 free Temper. Can melt down weapons (3+ months remaining) for half crafting components, plus some Rare components."},{id:"mentor",name:"Mentor",tier:"normal",category:"everyman",prerequisite:"1st Character Level (creation only)",description:"Begin play with one Advanced skill. Once each event: mentor can give instruction in one skill, research one question, or craft 4 basic items for you."},{id:"merciful_strike",name:"Merciful Strike",tier:"normal",category:"class",qualifyingClasses:["monk"],prerequisite:"Brawl, Monk",description:'Add the "Padded" flavor to melee weapon attacks. A character brought to 0 Body with Padded damage type will not enter their bleed-out count and is instead Unconscious. Armor dealt Padded damage is reduced normally but not considered Breached if reduced to 0.'},{id:"might_of_the_tiger",name:"Might of the Tiger",tier:"normal",category:"species",qualifyingSpecies:["deep_elf"],prerequisite:"Deep Elf",description:"When moving a downed/Helpless ally: +2 Base Strength. This strength also applies to challenges (physical) that endanger the Deep Elf or allies. Recognized as a champion; Deep Elf NPC reactions affected."},{id:"mighty_fury",name:"Mighty Fury",tier:"normal",category:"class",qualifyingClasses:["guardian"],prerequisite:"Guardian",description:"While Primal Fury is active, additionally gain 4 Blade Effects that are +5 Temporary Weapon Damage and Critical."},{id:"muscle_memory",name:"Muscle Memory",tier:"normal",category:"everyman",prerequisite:"Artisan",description:"PLACEHOLDER — see wiki for full description."},{id:"natural_hunter",name:"Natural Hunter",tier:"normal",category:"species",qualifyingSpecies:["felis"],prerequisite:"Felis",description:'10 counted action sniff: determine if item contains toxins. +1 Bonus on tracking Contested Rolls. At night/dark: always get species description when asking "What do I see".'},{id:"noxious_spores",name:"Noxious Spores",tier:"normal",category:"species",qualifyingSpecies:["myconid"],prerequisite:"Myconid",description:"Once per reset: upgrade Blinding Spores to Poison Nausea Aura."},{id:"oathbound",name:"Oathbound",tier:"normal",category:"species",qualifyingSpecies:["deep_dwarf","hill_dwarf","mountain_dwarf"],prerequisite:"Dwarf",description:"An oath taken will not be broken even if it means death. Grants Immunity to Command effects."},{id:"one_with_the_land",name:"One with the Land",tier:"normal",category:"species",qualifyingSpecies:["ent"],repeatable:!0,prerequisite:"Ent",description:"Twice each reset: generate any effect from the Knowledge Nature chart in Appendix 2. Do not need Knowledge Nature skill."},{id:"only_when_called",name:"Only When Called",tier:"normal",category:"class",qualifyingClasses:["paladin"],repeatable:!0,prerequisite:"Paladin",description:"Immune to Curse of Death effect regardless of source. Second purchase: can also remove Curse of Death from someone else once per reset."},{id:"overwhelming_power",name:"Overwhelming Power",tier:"normal",category:"class",qualifyingClasses:["warrior"],prerequisite:"Warrior, Overpower",description:"+1 Base Strength when wielding a Great Weapon. Blitz skill grants the Massive Modifier when used (Great Weapon must still be in hand)."},{id:"pack_mentality",name:"Pack Mentality",tier:"normal",category:"species",qualifyingSpecies:["rok_shen"],repeatable:!0,prerequisite:"Rok'Shen",description:'Once each reset: "Natural Wolf Pack!" — self and up to 10 allies may Flee. Follows normal Wolf Pack spell rules.'},{id:"photosynthesis",name:"Photosynthesis",tier:"normal",category:"species",qualifyingSpecies:["ent"],prerequisite:"Ent",description:'Stand in "tree position" (arms outstretched, concentration): regain up to 4 BP per minute up to maximum. Outdoors in daylight only (clouds OK, rain stops it).'},{id:"point_blank",name:"Point Blank",tier:"normal",category:"everyman",prerequisite:"Combat Archery",description:"Continue firing a bow while blocking with it. After bow is struck 5 times it becomes unstrung and must be restrung normally."},{id:"potent_blood",name:"Potent Blood",tier:"normal",category:"species",qualifyingSpecies:["deep_dwarf","hill_dwarf","mountain_dwarf"],prerequisite:"Dwarf",description:"When using Resist Toxin, heal 5 Body Points in addition to negating the effect."},{id:"pounce",name:"Pounce",tier:"normal",category:"species",qualifyingSpecies:["felis"],prerequisite:"Felis",description:"Once each reset: make an attack that duplicates the Knockdown skill. Call is the same as the skill."},{id:"power_chord",name:"Power Chord",tier:"normal",category:"class",qualifyingClasses:["bard"],prerequisite:"Bard",description:'Twice per reset: when wielding an instrument weapon, change the call for beneficial Songs from "Burst" to "All allies", OR for Dirges replace "Target" with "All Enemies".'},{id:"preparation",name:"Preparation",tier:"normal",category:"everyman",prerequisite:"Ambush",description:'Always leave Hide instantly and gain benefits of adding "Surprise" Modifier to next attack.'},{id:"rapid_fire",name:"Rapid Fire",tier:"normal",category:"class",qualifyingClasses:["gunslinger"],prerequisite:"Gunslinger",description:"Increases the Flurry of pistols by 1."},{id:"recover",name:"Recover",tier:"normal",category:"everyman",prerequisite:"10th Character Level",description:'Once per encounter: if a skill got "No Effect" response, draw back the spent resources via 2 minutes of Concentration. Can only be taken once.'},{id:"refracted_light",name:"Refracted Light",tier:"normal",category:"class",qualifyingClasses:["mage"],prerequisite:"Shared Light, Mage",description:"Gain 2 extra targets when using chain spell."},{id:"researcher",name:"Researcher",tier:"normal",category:"everyman",prerequisite:"Knowledge (Area) Rank 4",description:"During BGAs, research 2 questions with a single action. Characters with an Advanced Production skill may also research up to two Advanced Recipes simultaneously (each takes a BGA action each month)."},{id:"resilient",name:"Resilient",tier:"normal",category:"species",qualifyingSpecies:["gnome"],repeatable:!0,prerequisite:"Gnome",description:'Once each reset: when an attack would reduce BP to 0 or lower, call "Resilient" — be left at 1 BP and ignore any other effect from the attack. Passive skill.'},{id:"retain_magic",name:"Retain Magic",tier:"normal",category:"everyman",prerequisite:"30 Mana",description:"Once each encounter: 'keep' spell protectives up even if they would normally be stripped (vs Dispel, Anti-Magic, or Life spell). Can also allow an effect to bypass a protective instead."},{id:"right_between_the_eyes",name:"Right Between the Eyes",tier:"normal",category:"class",qualifyingClasses:["gunslinger"],repeatable:!0,prerequisite:"Gunslinger",description:"Twice per reset: Double Attack on a single shot, forcing the target to defend again or suffer the effect."},{id:"righteous_chorus",name:"Righteous Chorus",tier:"normal",category:"class",qualifyingClasses:["paladin"],prerequisite:"Paladin",description:"Deliver curative spells (Life and others) by voice rather than weapon or packet. Usable once per reset for every two Conviction Ranks, max 5. Does not apply to Healing Pool."},{id:"roll_with_it",name:"Roll With It",tier:"normal",category:"everyman",prerequisite:"Acrobatics",description:"Roll skill now reduces damage of an attack to 1 point instead of half damage."},{id:"royal_candidate",name:"Royal Candidate",tier:"normal",category:"species",qualifyingSpecies:["deep_elf"],prerequisite:"Deep Elf, 10th Character Level",description:"Gain free: 1 weapon skill of choice, Knowledge (Nobility) x1, Survival x1, Adrenaline Rush x1. Strong candidate for Tson'chi royalty."},{id:"scent",name:"Scent",tier:"normal",category:"species",qualifyingSpecies:["rok_shen"],prerequisite:"Rok'Shen",description:"+2 Bonus to Track Contested Rolls. Can determine species of a scent. 10 counted action: tell if a Toxin is present."},{id:"self_stabilize",name:"Self-Stabilize",tier:"normal",category:"species",qualifyingSpecies:["half_troll"],prerequisite:"Half-Troll",description:"Use Regeneration skill while Dying to set current BP to 0, stabilizing self. After 5 minutes wake with 1 BP."},{id:"shadow_strike",name:"Shadow Strike",tier:"normal",category:"everyman",prerequisite:"Conceal, Move Silent",description:"Doubles effects of Move Silent, allowing up to 30 steps or 2 attacks while remaining Hidden."},{id:"shield_prof_small",name:"Shield Proficiency, Small",tier:"normal",category:"everyman",description:"Allows use of a Small Shield."},{id:"shield_prof_medium",name:"Shield Proficiency, Medium",tier:"normal",category:"everyman",prerequisite:"Shield Proficiency, Small (from class or other non-Power source)",description:"Allows use of a Medium Shield. Cannot be taken if Power: Shield Proficiency, Small was used."},{id:"shield_prof_large",name:"Shield Proficiency, Large",tier:"normal",category:"everyman",prerequisite:"Shield Proficiency, Medium (from class or other non-Power source)",description:"Allows use of a Large Shield. Cannot be taken if Power: Shield Proficiency, Medium was used."},{id:"shred",name:"Shred",tier:"normal",category:"species",qualifyingSpecies:["felis"],repeatable:!0,prerequisite:"Felis and Lengthen Claws",description:'Twice each reset: attack with Claws called as "Destroy Armor Strike" — one swing hit or miss.'},{id:"shrug_it_off",name:"Shrug it Off",tier:"normal",category:"everyman",prerequisite:"Survival x2",description:"Twice each reset: ignore a negative status effect until end of combat, then take full effect with fresh duration. Cannot ignore: Petrify, Prison, Kill, Killing Blow, Implosion, Slay, Binding effects, or damage."},{id:"single_minded_fury",name:"Single Minded Fury",tier:"normal",category:"everyman",prerequisite:"Ambidexterity",description:"+1 Base Weapon Damage when fighting with 2 weapons of the same length and type (not Brawl weapons)."},{id:"single_shot",name:"Single Shot",tier:"normal",category:"everyman",description:"Weapon Proficiency in single shot pistols (pistols that must be reloaded after every shot)."},{id:"sir_sneaks_a_lot",name:"Sir Sneaks-a-lot",tier:"normal",category:"class",qualifyingClasses:["rogue"],prerequisite:"Sneaky Sneaky, Rogue",description:"Add the silent prefix for free any time able to use the Surprise modifier. Both may be used on an attack if applicable."},{id:"sling_arrow",name:"Sling Arrow",tier:"normal",category:"class",qualifyingClasses:["bard"],prerequisite:"Bard",description:"Use a stringed instrument weapon (Lute, Harp, etc.) as both melee and ranged weapon. Rep must be appropriately constructed for combat type."},{id:"specialization",name:"Specialization",tier:"normal",category:"class",qualifyingClasses:["champion","trooper","warrior"],prerequisite:"Champion, Trooper or Warrior, 4th Character Level",description:"+1 Base Weapon Damage with a chosen weapon type."},{id:"spell_devotion",name:"Spell Devotion",tier:"normal",category:"species",qualifyingSpecies:["high_elf"],prerequisite:"High Elf",description:'Once each reset: cast any Spirit or Elemental Path spell of 5th level or lower as "Natural <Effect>".'},{id:"spell_focus_1",name:"Spell Focus I",tier:"normal",category:"everyman",prerequisite:"Spell Pool 2",affectsSpellPool:!0,spellPoolBonus:15,description:"Increases Spell Pool by 15 points and Spell Cap by 5 points."},{id:"spell_focus_2",name:"Spell Focus II",tier:"normal",category:"everyman",prerequisite:"Spell Pool 3 and Spell Focus I",affectsSpellPool:!0,spellPoolBonus:20,description:"Further increases Spell Pool by 20 points (stacks with Spell Focus I) and Spell Cap by 5 points."},{id:"sprouts",name:"Sprouts",tier:"normal",category:"species",qualifyingSpecies:["myconid"],prerequisite:"Myconid",description:"Produce herbs equal to 75 Component Points from the Harvesting page. Eye for Quality does not apply."},{id:"stalwart_guard",name:"Stalwart Guard",tier:"normal",category:"species",qualifyingSpecies:["deep_dwarf","hill_dwarf","mountain_dwarf"],prerequisite:"Born to Serve",description:"Once each reset: plant right foot and enter stance for 5 minutes or one Encounter. Gain Immunity to Fear and Damage Cap 5. Ends if foot moves or character becomes Helpless."},{id:"strong_arm",name:"Strong Arm",tier:"normal",category:"class",qualifyingClasses:["champion","trooper"],prerequisite:"Champion or Trooper",description:"While wielding a skilled shield: not affected by Massive Modifier (treats all such attacks that strike shield as normal swings). Can also use Deflect and Parry with shield, including against Massive Modifier attacks."},{id:"subtlety",name:"Subtlety",tier:"normal",category:"class",qualifyingClasses:["rogue","ranger"],prerequisite:"Rogue or Ranger, 4th Character Level",description:"+2 additional Precision damage. Functions like the Precision skill but applies to both hands."},{id:"swamp_thing",name:"Swamp Thing",tier:"normal",category:"species",qualifyingSpecies:["half_troll"],prerequisite:"Half-Troll",description:"Breathe underwater as well as in air. Gain Terrain Adaptation: Water."},{id:"take_it_like_a_champ",name:"Take it like a Champ",tier:"normal",category:"class",qualifyingClasses:["champion"],prerequisite:"Survival x2, Champion",description:"By burning a use of the Survival skill: ignore a negative status effect until end of combat, then take full effect with fresh duration. Cannot ignore: Petrify, Prison, Kill, Killing Blow, Implosion, Slay, Binding effects, or damage."},{id:"talented_assistant",name:"Talented Assistant",tier:"normal",category:"everyman",description:"Aid a player crafting in a workshop and reduce their creation time by 1 minute per rank of the item being crafted."},{id:"taproot",name:"Taproot",tier:"normal",category:"species",qualifyingSpecies:["ent"],prerequisite:"Ent",description:'1 minute concentration in "tree position": negative effects are removed per the Dispel effect. Some effects may not be removable. Character must be able to freely move and be conscious.'},{id:"terrain_adaptation",name:"Terrain Adaptation",tier:"normal",category:"everyman",prerequisite:"Knowledge (Planes) Rank 3",description:"Become attuned to a Terrain Type associated with an Inner Element (Fire, Stone, Water, or Wind). Ignore many normal penalties that Terrain inflicts."},{id:"the_trees_are_angry",name:"The Trees are Angry",tier:"normal",category:"species",qualifyingSpecies:["ent"],prerequisite:"One with the Land",description:"If a target desecrates a tree in the Ent's presence, may take a Berserk effect against that person and gain +4 Temporary Strength or +50 Spell Pool in attacks against them for 5 minutes or one Encounter."},{id:"touch_of_the_wind",name:"Touch of the Wind",tier:"normal",category:"species",qualifyingSpecies:["high_elf"],repeatable:!0,prerequisite:"High Elf",description:"Once each reset: automatically succeed on a physical challenge. When falling: Featherfall effect but suffer half max BP in damage (never reduced below 1)."},{id:"touched_by_the_shadow",name:"Touched by the Shadow",tier:"normal",category:"species",qualifyingSpecies:["deep_elf"],repeatable:!0,prerequisite:"Deep Elf",description:"3 times each reset: spend 1 minute concentrating to be Dispelled of all negative effects."},{id:"toughen",name:"Toughen",tier:"normal",category:"everyman",repeatable:!0,affectsBodyPoints:!0,bpBonus:5,description:"Increases Base Body Points by 5. Can be taken multiple times."},{id:"trapper",name:"Trapper",tier:"normal",category:"everyman",prerequisite:"Hunter's Call, Snare",description:"Snare phys-rep changes to red (undetectable, effect becomes Natural Web). Hunter's Call can be used at NPC Camp to gather up to 10 Common or 2 Uncommon Foodstuffs."},{id:"trollsblood",name:"Trollsblood",tier:"normal",category:"species",qualifyingSpecies:["half_troll"],prerequisite:"Half-Troll, Regeneration x5",description:"During 4-minute Death Count: 3 counted action to Revive by expending 3 Regenerations. Cannot be used if burned or killed with Fire flavor."},{id:"tumble",name:"Tumble",tier:"normal",category:"everyman",prerequisite:"Athletics",description:"Take half damage from falls less than 100 feet. Jump an additional 10 feet during Feats of Strength."},{id:"tunnel_fighter",name:"Tunnel Fighter",tier:"normal",category:"species",qualifyingSpecies:["deep_elf","deep_dwarf"],prerequisite:"Deep Elf or Deep Dwarf",description:"When fighting underground: +1 Permanent Weapon Damage and gain Terrain Adaptation: Stone."},{id:"undying_fury",name:"Undying Fury",tier:"normal",category:"class",qualifyingClasses:["guardian"],prerequisite:"Guardian",description:"Once during each use of Primal Fury: when an attack would normally render the character Unconscious, Resist that attack."},{id:"warning_signs",name:"Warning Signs",tier:"normal",category:"everyman",prerequisite:"Track x10, Knowledge (Nature) Rank 2",description:"PLACEHOLDER — see wiki for full description."},{id:"weapon_proficiency",name:"Weapon Proficiency",tier:"normal",category:"everyman",description:"Proficiency and ability to use a single weapon of choice not already granted by class. Does not provide gun proficiency."},{id:"wild_magic",name:"Wild Magic",tier:"normal",category:"class",qualifyingClasses:["caller"],prerequisite:"Caller",description:'Once per reset: invoke "Wild Magic" for a beneficial effect in accordance with current needs. Discuss with marshal for final effect if beyond standard spells levels 1-9. Verbal: "Magic [spell name] wild magic".'},{id:"wisp_form",name:"Wisp Form",tier:"normal",category:"class",qualifyingClasses:["caller"],prerequisite:"Caller",affectsBodyPoints:!0,bpBonus:0,description:"Enter Wisp form instead of Beast form when shifting. Stats: 15 Body, Resist Toxin/Physical x1, Flee x2, ½ damage from physical, Immune to Wind & Lightning, +50 Spell Pool, 1 bonus spell up to 5 mana."},{id:"wrath_of_nature",name:"Wrath of Nature",tier:"normal",category:"class",qualifyingClasses:["guardian"],prerequisite:"Guardian",description:"While in a natural setting (not in a city): +2 Base Strength."},{id:"advanced_magical_training",name:"Advanced Magical Training",tier:"heroic",category:"everyman",prerequisite:"Magical Training",description:"Extends understanding of magic to use Scrolls from a second School of magic."},{id:"arcane_strike",name:"Arcane Strike",tier:"heroic",category:"class",qualifyingClasses:["spellblade"],repeatable:!0,prerequisite:"Spellblade",description:"Twice each reset (in addition to normal Channel allotment): deliver Channel skill using Arcane Delivery Type instead of Magic Delivery Type."},{id:"armored_to_the_teeth",name:"Armored to the Teeth",tier:"heroic",category:"everyman",prerequisite:"Armor Proficiency",description:"Gain additional 10 armor points over class maximum, readjusted with normal armor. Temporary Armor effects do not stack."},{id:"backlash",name:"Backlash",tier:"heroic",category:"class",qualifyingClasses:["spellblade"],prerequisite:"Spellblade, Aura Emulation",description:'Activate Barrier; on first hit call "Magic Aura <Flavor>" per Aura Emulation. Removes Barrier and does not protect from damage.'},{id:"bathe_in_poison",name:"Bathe in Poison",tier:"heroic",category:"class",qualifyingClasses:["rogue"],prerequisite:"Rogue",description:"Twice per reset: use an attached Blade Poison in conjunction with Blade Shower."},{id:"blood_oath",name:"Blood Oath",tier:"heroic",category:"species",qualifyingSpecies:["deep_dwarf","hill_dwarf","mountain_dwarf"],prerequisite:"Family Weapon",description:"Once each reset (5 minutes or one Encounter): while wielding Family Weapon, gain the Flavor Carrier Ward."},{id:"bodyguard",name:"Body Guard",tier:"heroic",category:"class",qualifyingClasses:["champion"],prerequisite:"Champion",description:"Twice each reset (1 hour or Module): safeguard one target with level < half yours or max BP < half yours. Target gains Reduced: Half from physical attacks; can use Deflect/Parry/Weapon Ward on their behalf."},{id:"cast_iron",name:"Cast Iron",tier:"heroic",category:"background",qualifyingBackgrounds:["bg_nomad"],prerequisite:"Nomad Background",description:"Immune to Rot (not immune to damage/other effects of attack). Resist Rot can also Resist: Plague, Vampiric, and Wounding."},{id:"cat_like_reflexes",name:"Cat Like Reflexes",tier:"heroic",category:"species",qualifyingSpecies:["felis"],prerequisite:"Felis",description:"Automatically succeed on physical challenges based on dexterity or grace (not strength-based challenges)."},{id:"cataclysm",name:"Cataclysm",tier:"heroic",category:"class",qualifyingClasses:["mage","warlock"],prerequisite:"Mage, Warlock",description:'Twice each reset: "All enemies Voice Vulnerability <Flavor>" — inflict Vulnerability on all enemies in combat.'},{id:"chakra_focus",name:"Chakra Focus",tier:"heroic",category:"class",qualifyingClasses:["monk"],prerequisite:"Monk",description:"PLACEHOLDER — see wiki for full description."},{id:"combat_challenge",name:"Combat Challenge",tier:"heroic",category:"class",qualifyingClasses:["champion"],prerequisite:"Champion",description:"Once per Encounter: challenge a sentient foe to attack only the challenger by all means, forsaking other targets. Lasts 5 minutes or one Encounter, or until either party is rendered Helpless."},{id:"combo_move",name:"Combo Move",tier:"heroic",category:"class",qualifyingClasses:["rogue"],prerequisite:"Rogue",description:"Once each Encounter: when landing an Offensive Special Attack, the next Special Attack (must be a lower cost technique, min 1) is free."},{id:"dedication",name:"Dedication",tier:"heroic",category:"background",qualifyingBackgrounds:["bg_scholar"],prerequisite:"Scholar Background",description:"Reduces cost of abilities for favored Knowledge (Area) skills by 1 point, minimum 1."},{id:"dexterity_armor",name:"Dexterity Armor",tier:"heroic",category:"everyman",repeatable:!0,description:"Each time taken: gain up to 20 points of Dexterity Armor (still limited by Class and Powers for maximum armor)."},{id:"diamond_skin",name:"Diamond Skin",tier:"heroic",category:"class",qualifyingClasses:["monk"],prerequisite:"Monk",description:"Twice each reset: automatically Resist the next three spells/effects with Magic Delivery Type (beneficial or hostile)."},{id:"dual_spirit",name:"Dual Spirit",tier:"heroic",category:"class",qualifyingClasses:["guardian"],prerequisite:"Guardian",description:"Have two different totems active simultaneously. Still consumes two uses of the skill."},{id:"elemental_emulation",name:"Elemental Emulation",tier:"heroic",category:"everyman",prerequisite:"Aura Emulation",description:'3 times each reset: change Delivery Type of Aura Emulation from "Magic Aura" to "Elemental Aura".'},{id:"enhanced_kintsugi_barrier",name:"Enhanced Kintsugi Barrier",tier:"heroic",category:"class",qualifyingClasses:["spellblade"],prerequisite:"Kintsugi Barrier",description:"When the Barrier skill is used: triggers both a Refit AND a Purity of Cleansing Waters (self only)."},{id:"enhanced_shifting_greater",name:"Enhanced Shifting, Greater",tier:"heroic",category:"class",qualifyingClasses:["caller"],prerequisite:"Caller, Enhanced Shifting (cannot have Magical Shifting)",description:"Use a single two-handed claw or a long and medium claw instead of paired medium claws. Gain one Regenerate and two special attacks per reset chosen from: Crippling Strike, Knockdown, Maim, and Shred (Destroy Armor Strike). May choose the same one twice."},{id:"enhanced_totems",name:"Enhanced Totems",tier:"heroic",category:"class",qualifyingClasses:["guardian"],prerequisite:"Guardian",description:"Totems gain additional effect options: Aerial (Fly 1hr + Soar), Aquatic (plant foot, cast natural 5 healing by touch), Earthen (+10 Body + Recovery 5), Fire Totem (fully heal on transition from Dying to Death state)."},{id:"escape_plan",name:"Escape Plan",tier:"heroic",category:"class",qualifyingClasses:["rogue"],prerequisite:"Rogue",description:"Conceal can be used while conscious and unbound (not in Prison or Petrified). Passive ability. If staying hidden for 10+ seconds: all non-Instant/non-Permanent negative effects are removed (not Derangements)."},{id:"exotic_ammo",name:"Exotic Ammo",tier:"heroic",category:"class",qualifyingClasses:["ranger"],repeatable:!0,prerequisite:"Ranger",description:"3 times each reset: 10 counted action to create Exotic Quiver (10 charges, 1 per shot hit or miss). Effect: +3 Temporary Damage + Flavor Carrier (Fire/Stone/Water/Wind/Iron/Magic). Lasts for Encounter or until all charges used."},{id:"feedback_loop",name:"Feedback Loop",tier:"heroic",category:"class",qualifyingClasses:["mage","caller"],prerequisite:"Spell Pool 3 (Mage page) / Spell Pool 4 (Powers page)",description:"3 times each reset: refresh Spell Pool on a 10 counted action instead of concentrating for normal amount of time."},{id:"flutter_harder",name:"Flutter Harder!",tier:"heroic",category:"species",qualifyingSpecies:["pixie"],prerequisite:"Flit & Flutter",description:"Flee uses gained through Flit and Flutter can now be used even while under a Binding effect (excluding Prison). May not be used to flee into combat."},{id:"focus_zen",name:"Focus Zen",tier:"heroic",category:"class",qualifyingClasses:["monk"],repeatable:!0,prerequisite:"Monk",description:'Once each reset: functions as "Arcane Break Enchantments" on a target.'},{id:"full_blooded",name:"Full-Blooded",tier:"heroic",category:"species",qualifyingSpecies:["half_troll"],prerequisite:"Half-Troll",description:"Gain Slow Regeneration: 30 minutes of rest + no combative actions = healed to maximum BP, cured of all Toxins, and all missing limbs Regenerated."},{id:"greater_specialization",name:"Greater Specialization",tier:"heroic",category:"class",qualifyingClasses:["champion","trooper","warrior"],repeatable:!0,prerequisite:"Specialization",description:"Choose one technique you know: use it at 1 Energy discount (min 1). Only with Specialization weapon. Different technique must be chosen each time."},{id:"harder_to_spot",name:"Harder to Spot",tier:"heroic",category:"species",qualifyingSpecies:["pixie"],prerequisite:"Corner of Your Eye",description:"When using Conceal from Corner of Your Eye, the Pixie turns invisible (green headband). Lasts up to 1 hour or module. Ends instantly if interacting with any in-game object or attacking."},{id:"hardened_training",name:"Hardened Training",tier:"heroic",category:"background",qualifyingBackgrounds:["bg_soldier"],prerequisite:"Soldier Background",description:"Grants either 2 Energy, 4 Mana, or 10 Spell Pool. Character must already possess at least the same amount base of the chosen source."},{id:"heroic_toughness",name:"Heroic Toughness",tier:"heroic",category:"everyman",repeatable:!0,affectsBodyPoints:!0,bpBonus:10,description:"Permanently increases Body Points by 10. Also increases effects of Recovery by 3 points. Stacks with itself."},{id:"holy_nova",name:"Holy Nova",tier:"heroic",category:"everyman",prerequisite:"Spirit school of magic",description:'Twice each reset: "All allies Voice 25 Healing Font".'},{id:"hype_man",name:"Hype Man",tier:"heroic",category:"class",qualifyingClasses:["bard"],prerequisite:"Bard",description:'Once per reset: "Allies Voice Delivery" — all allies deliver their next Energy or Mana driven skill via voice delivery.'},{id:"im_on_a_boat",name:"I'm on a Boat",tier:"heroic",category:"background",qualifyingBackgrounds:["bg_sailor"],prerequisite:"Sailor Background",description:"Possess a small vessel (10 people, min 2 to sail). Gain Underwater Combat."},{id:"improved_parry",name:"Improved Parry",tier:"heroic",category:"everyman",prerequisite:"Parry, Knowledge (Warfare) Rank 2",description:"Use Deflect, Parry, and Riposte against weapon-delivered attacks regardless of Vector, but only for attacks targeting only themselves."},{id:"jam_device",name:"Jam Device",tier:"heroic",category:"species",qualifyingSpecies:["gnome"],prerequisite:"Gnomish Talent",repeatable:!0,description:'Twice each reset: "<Target> Voice Jam Device" — overload a mechanical device, making it dormant for 5 minutes (trap won\'t trigger, lock undone). Against a construct: halt for up to 1 minute.'},{id:"linguist",name:"Linguist",tier:"heroic",category:"everyman",prerequisite:"5 different Read and Write skills",description:"Study written text in unknown languages to figure out content: Common languages 15 minutes, Rare languages 60 minutes. After study can also write in the same language."},{id:"magical_shifting",name:"Magical Shifting",tier:"heroic",category:"class",qualifyingClasses:["caller"],prerequisite:"Enhanced Shifting (cannot have Greater Enhanced Shifting)",description:'While shifted: use one Caller spell delivered as "Magical [Spell Name]". Also gain breath weapon with 3 uses of "Natural 30 lightning" delivered via packet.'},{id:"mana_tap",name:"Mana Tap",tier:"heroic",category:"everyman",prerequisite:"Evoker",description:"Refresh Spell Pool by expending 7 Mana from a Mana Gem. Reduces Knowledge Point cost for tapping a Ley Line by 1 and reduces time by 5 minutes."},{id:"markup",name:"Mark Up",tier:"heroic",category:"everyman",prerequisite:"Merchant Rank 5",description:"Once each reset: increase value of one Merchant action by 10%."},{id:"master_merchant",name:"Master Merchant",tier:"heroic",category:"background",qualifyingBackgrounds:["bg_merchant"],prerequisite:"Merchant Background",description:"Receive 4 silver for each level of the Merchant skill possessed at Check-In each game."},{id:"master_of_creation",name:"Master of Creation",tier:"heroic",category:"everyman",prerequisite:"Create Wondrous Item, Knowledge (Magic) Rank 5",description:"Use a Wondrous Item recipe twice before destroyed (after first use, locked to that person). When researching: make two rolls and choose which recipe to receive."},{id:"momentum",name:"Momentum",tier:"heroic",category:"class",qualifyingClasses:["warrior"],prerequisite:"Warrior",description:"Reduce Permanent Strength required to Break Free from Binding by 2 points (does not lower damage taken for doing so)."},{id:"natures_embrace",name:"Nature's Embrace",tier:"heroic",category:"class",qualifyingClasses:["caller"],prerequisite:"Caller",description:"Gain Recovery (not Fast Healing 5 as listed on Powers page — class page specifies Recovery). Twice each reset: Auto-Stabilize setting BP to 0."},{id:"one_voice",name:"One Voice",tier:"heroic",category:"species",qualifyingSpecies:["ent"],prerequisite:"Entmoot",description:"Use Entmoot alone, needing no other Ents."},{id:"paralytic_spores",name:"Paralytic Spores",tier:"heroic",category:"species",qualifyingSpecies:["myconid"],prerequisite:"Noxious Spores",description:"Once per reset: upgrade Blinding Spores to Poison Paralyze Aura. Long-lived Myconids whose defensive spores have improved in potency."},{id:"posse",name:"Posse",tier:"heroic",category:"background",qualifyingBackgrounds:["bg_outlaw"],prerequisite:"Outlaw Background",description:"Friends in all kinds of places. Allies can be called in for non-combat situations (e.g., creating distractions to skip Encounters in a Module)."},{id:"practiced_crafter",name:"Practiced Crafter",tier:"heroic",category:"background",qualifyingBackgrounds:["bg_craftsman"],prerequisite:"Craftsman Background",description:"Reduce creation time by an additional minute (min 1 minute/item level for basic, 5 minutes for advanced)."},{id:"purge_the_shadows",name:"Purge the Shadows",tier:"heroic",category:"everyman",prerequisite:"School of Spirit, Knowledge (Cycle) Rank 5",description:"PLACEHOLDER — see wiki for full description."},{id:"rapid_shot",name:"Rapid Shot",tier:"heroic",category:"class",qualifyingClasses:["ranger"],repeatable:!0,prerequisite:"Ranger",description:'Twice each reset: when a ranged attack is defended against in ANY fashion, call "Double Attack" forcing target to defend again or suffer the effect.'},{id:"regrowth",name:"Regrowth",tier:"heroic",category:"species",qualifyingSpecies:["myconid"],description:"Generate a Natural Reincarnate effect on self while there is a decaying corpse within 20 feet (extends to 50 feet if aura was used in the preceding combat). Completely destroys the body. No Concentration required."},{id:"renown",name:"Renown",tier:"heroic",category:"background",qualifyingBackgrounds:["bg_aristocrat"],prerequisite:"Aristocrat Background",description:"Character is considered a minor noble (Tier 1, title Esquire). Gain 2 Favor with an Order if a member; if not, an Order will accept you on the spot at 4 Favor."},{id:"reverberate",name:"Reverberate",tier:"heroic",category:"class",qualifyingClasses:["bard"],prerequisite:"Bard",description:"Twice each reset: gain benefits of Encore without continuing the performance. Lasts 5 minutes or one Encounter; Bard can take other actions and announce effect every 30 seconds."},{id:"ritual_adept",name:"Ritual Adept",tier:"heroic",category:"everyman",prerequisite:"Ritualism",description:"For memorized rituals: lower Fuel cost by up to 5 and Named Component cost by 1 (minimum 1)."},{id:"scout",name:"Scout",tier:"heroic",category:"background",qualifyingBackgrounds:["bg_woodsman"],prerequisite:"Woodsman Background",description:"In natural settings: Track Contested Roll even without ranks (treated as 1 level). With 1+ level Tracking: +3 Bonus tracking, +5 Negative counter-tracking. Can ask questions about tracks without Contested Roll."},{id:"strengthen_bloodline",name:"Strengthen Bloodline",tier:"heroic",category:"everyman",prerequisite:"5 Species Resists",description:"When using a Species Resist to negate an effect, become Immune to further effects of the same type from the same attacker. Damage attached to the attack is not negated."},{id:"subsonic",name:"Subsonic",tier:"heroic",category:"class",qualifyingClasses:["bard"],prerequisite:"Bard",description:'"Everyone in the sound of my Voice Suppress Verbal" — prevents all affected from speaking or using skills/abilities requiring speech. Lasts 5 minutes or one Encounter, or until concentration breaks.'},{id:"tolerance",name:"Tolerance",tier:"heroic",category:"everyman",prerequisite:"Terrain Adaptation or Survival x5",description:"Lower Fatigue severity by a tier in all situations. Hold breath for up to 10 minutes (5 minutes in combat)."},{id:"triage",name:"Triage",tier:"heroic",category:"background",qualifyingBackgrounds:["bg_healer"],prerequisite:"Healer Background",description:"First Aid can be performed in a 10 counted action instead of normal time. Range of Diagnose skill changes to Line of Sight."},{id:"triple_jointed",name:"Triple Jointed",tier:"heroic",category:"species",qualifyingSpecies:["rok_shen"],prerequisite:"Rok'Shen, Limber Form",description:"Immune to all Pin effects. Bind and Web effects' duration reduced to 30 seconds."},{id:"unarmed_combat",name:"Unarmed Combat",tier:"heroic",category:"everyman",prerequisite:"Brawl",description:"Can use medium length reps with Brawl skill and use Special Attacks with Brawl weapons."},{id:"unleash_elements",name:"Unleash Elements",tier:"heroic",category:"everyman",prerequisite:"Knowledge (Magic)/(Warfare) Rank 3, Knowledge (Planes) Rank 3",description:"1 minute concentrating while touching weapons: destroy a Named Component (Essence of Fire/Water/Wind/Stone/Shadow, Phoenix Talon, or Shattered Star) to grant up to 5 weapons that Flavor Carrier for 5 minutes or one Encounter."},{id:"unyielding",name:"Unyielding",tier:"heroic",category:"everyman",prerequisite:"Successfully resurrected 3 times",description:"Once each reset: when pulling a fail on a resurrection Contested Roll, instantly make a second draw."},{id:"war_cry",name:"War Cry",tier:"heroic",category:"class",qualifyingClasses:["trooper"],prerequisite:"Trooper",description:'"All allies in the sound of my voice, War Cry" — next Technique used by allies costs 1 less Energy. Does not stack or affect user. Lasts 5 minutes or one Encounter, or until energy is used.'},{id:"warp_magic",name:"Warp Magic",tier:"heroic",category:"species",qualifyingSpecies:["deep_elf","deep_dwarf"],prerequisite:"Deep Elf or Deep Dwarf, Improved Species Resist Magic",description:"When using Resist Magic: absorb some power, gaining 2 Energy or 20 Spell Pool. Must use within 5 minutes or Encounter or it is lost."},{id:"whirlwind",name:"Whirlwind",tier:"heroic",category:"class",qualifyingClasses:["warrior"],prerequisite:"Overwhelming Power",description:"Twice each reset: use the Burst Modifier."},{id:"wisp_form_greater",name:"Wisp Form, Greater",tier:"heroic",category:"class",qualifyingClasses:["caller"],prerequisite:"Wisp Form",description:"Upgraded Wisp Form: 25 Body, Resist Toxin/Physical x2, Flee x3, ½ damage from ALL attacks, Non-corporeal, can Flee into combat left in last 5 mins, +75 Spell Pool, can change Spell Pool flavor to Venom, 2 bonus spells up to 7 mana."},{id:"wyld_heart",name:"Wyld Heart",tier:"heroic",category:"class",qualifyingClasses:["guardian"],prerequisite:"Guardian",description:"When using Primal Fury: gain Damage Cap 5 for the duration."},{id:"years_of_mastery",name:"Years of Mastery",tier:"heroic",category:"species",qualifyingSpecies:["high_elf"],prerequisite:"High Elf",description:"Pick a Knowledge (Area) skill with no ranks: gain 3 ranks instantly. For Rare Knowledge (Area) skills, normal prerequisites must still be met."},{id:"n95",name:"N-95",tier:"heroic",category:"class",qualifyingClasses:["champion"],prerequisite:"Bulwark",description:"Upgrades the Bulwark power to also block the Poison vector in addition to Elemental."},{id:"all_about_angles",name:"All About the Angles",tier:"heroic",category:"class",qualifyingClasses:["champion"],description:'Treat the "Body" carrier as if it were "Normal" for 1 hour or module.'},{id:"revenger",name:"Revenger",tier:"heroic",category:"class",qualifyingClasses:["champion"],prerequisite:"Defender",description:"Whenever you use Defend on someone or use Bodyguard, gain the benefit of Favored Enemy against the attacker until the end of combat."},{id:"mindless_fury",name:"Mindless Fury",tier:"heroic",category:"class",qualifyingClasses:["guardian"],prerequisite:"Guardian",description:"The Guardian is immune to Mental effects while using their Primal Fury."},{id:"powerful_totem",name:"Powerful Totem",tier:"heroic",category:"class",qualifyingClasses:["guardian"],prerequisite:"Guardian",description:"When the Guardian activates Primal Fury, they gain the use of one of their Totems for free."},{id:"butt_stroke",name:"Butt Stroke / Pistol Whip",tier:"normal",category:"class",qualifyingClasses:["gunslinger"],prerequisite:"Gunslinger",description:"Voice Physical Stun, within melee range. Usable twice per reset."},{id:"counterfire",name:"Counterfire",tier:"normal",category:"class",qualifyingClasses:["gunslinger"],prerequisite:"Gunslinger",description:'Twice per reset: "Reflect" an incoming numerical damage. Works on Physical Vector only.'},{id:"gs_sniper",name:"Sniper",tier:"heroic",category:"class",qualifyingClasses:["gunslinger"],prerequisite:"Longshot",description:"Additional 1 Grit discount at 20ft+, but requires a 3 count to enter position and sets the Gunslinger to an un-mitigatable Slow effect. Requires Concentration."},{id:"gs_iron_rain",name:"Iron Rain",tier:"heroic",category:"class",qualifyingClasses:["gunslinger"],prerequisite:"Lead Rain",description:'Upgrades Lead Rain damage call to "Voice All Enemies <damage> Iron". Grants 1 additional use of Fan the Hammer per reset.'},{id:"gs_scatter_blast",name:"Scatter Blast",tier:"heroic",category:"class",qualifyingClasses:["gunslinger"],prerequisite:"Lead Rain",description:"Allows the addition of Disabling Shot to Lead Rain."},{id:"gs_trained_hunter",name:"Trained Hunter",tier:"heroic",category:"class",qualifyingClasses:["gunslinger"],prerequisite:"Knowledge (Warfare) Rank 2",description:"Twice per reset: pull a single clip of exotic ammo exploiting an identified weakness of a visible enemy. 10 shots must be used in that encounter."},{id:"gs_counterbattery",name:"Counterbattery",tier:"heroic",category:"class",qualifyingClasses:["gunslinger"],prerequisite:"Counterfire",description:"Upgrades Counterfire: can now Reflect Effects as well as damage. On Physical Vector effects, the effect is Reflected without the Gunslinger taking the effect. On other vectors, Gunslinger still takes the effect itself."},{id:"spell_mastery",name:"Spell Mastery",tier:"heroic",category:"class",qualifyingClasses:["mage"],prerequisite:"Two Schools of Magic",description:'Twice per day: add "Voice" delivery to a memorized spell up to 9th level. "Voice (target) Magic (Spell Name)". Cannot be used with scrolls or Chain Spell.'},{id:"fork_in_the_spell",name:"Fork in the Spell",tier:"heroic",category:"class",qualifyingClasses:["mage"],description:"Grants the Forked Spell Ley ability at the cost of 1 Ley Point per use."},{id:"elemental_focus",name:"Elemental Focus",tier:"heroic",category:"class",qualifyingClasses:["mage"],prerequisite:"Elemental Modality",description:"Throw a spell or Spell Pool attack with the Elemental vector for one hour or one Encounter."},{id:"black_belt",name:"Black Belt",tier:"heroic",category:"class",qualifyingClasses:["monk"],prerequisite:"Monk",description:"Allows the character to maintain TWO Monk Martial Styles active simultaneously in combat."},{id:"elemental_specialist",name:"Elemental Specialist",tier:"normal",category:"class",qualifyingClasses:["spellblade"],prerequisite:"Element Exclusion",affectsSpellPool:!0,spellPoolBonus:25,description:"Prerequisite: Element Exclusion. Stacks with Element Exclusion: +25 additional Spell Pool and +10 Spell Cap."},{id:"novolley",name:"Novolley",tier:"normal",category:"class",qualifyingClasses:["spellblade"],description:'Twice per reset: call Nova as "All enemies Voice Elemental 40 [Element]".'},{id:"elemental_master",name:"Elemental Master",tier:"heroic",category:"class",qualifyingClasses:["spellblade"],prerequisite:"Elemental Specialist",affectsSpellPool:!0,spellPoolBonus:50,description:"Doubles the bonuses of both Elemental Exclusion powers (+30 cap and +100 Spell Pool total). All Spellblade elemental abilities (Spell Pool, Elemental Blade, Burning Rage, etc.) now use only the remaining chosen element."},{id:"deep_valleys",name:"Deep Valleys",tier:"heroic",category:"class",qualifyingClasses:["spellblade"],description:"Nova now deals 80 points of damage instead of 40. Novolley calls also increase to 80."},{id:"trp_greater_spec",name:"Greater Specialization",tier:"heroic",category:"class",qualifyingClasses:["trooper"],prerequisite:"Specialization",description:"Choose one known technique to use at a 1 Energy discount (minimum 1). Can be selected multiple times for different techniques. Only usable with the weapon chosen via Specialization."},{id:"trp_war_cry",name:"War Cry",tier:"heroic",category:"class",qualifyingClasses:["trooper"],description:'"All allies in the sound of my voice, War Cry" — allied next technique costs 1 less Energy. Does not affect the user. Lasts 5 minutes or one Encounter, or until Energy is used. Spellcasters reduce spell cost by 2 mana instead.'},{id:"trp_master_all_trades",name:"Master of All Trades",tier:"heroic",category:"class",qualifyingClasses:["trooper"],description:"Unlock up to 16 additional Energy purchases at 4 SP each. Stacks with base class maximum of 48 and the Jack of All Trades bonus."},{id:"trp_bulwark",name:"Trooper's Bulwark",tier:"heroic",category:"class",qualifyingClasses:["trooper"],description:"Block Elemental vector attacks with shield or via Deflect/Parry where applicable."},{id:"trp_muscle_overload",name:"Muscle Overload",tier:"heroic",category:"class",qualifyingClasses:["trooper"],prerequisite:"Muscle Memory",description:"Muscle Memory can now be used a second time even if another defense is called, up to a maximum of 2 total uses per activation."},{id:"wlk_heighten_pact",name:"Heighten Pact",tier:"normal",category:"class",qualifyingClasses:["warlock"],prerequisite:"Dark Pact",description:'Strengthen one Pact further and optionally purchase a second Pact. Blade: weapon gains +1 Base Damage and Void Flavor Carrier. Iron: Spend 1 Body to "bleed" on weapon, swing Iron carrier for one Encounter. Eye: 60-second trance to summon ethereal eye to observe anywhere on same plane (helpless while active; max 1 hour; plot notification required). Knowledge: Tome gains 1 Mage/Caller spell up to 5th level, 1 Mage General spell up to 9th level, and 2 Ley Points.'},{id:"wlk_void_messenger",name:"Void Messenger",tier:"normal",category:"class",qualifyingClasses:["warlock"],description:"Shadow can travel
