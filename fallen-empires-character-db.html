section for details."},{id:"disable_device_adv",name:"Disable Device (Ranks 11-20)",spCost:3,maxPurchases:10,prerequisite:"Disable Device Rank 10",isAdvanced:!0,description:"Advanced Disable Device ranks 11-20. Each rank adds +1 Bonus to Contested Rolls."},{id:"engineering_5",name:"Engineering Rank 5",spCost:8,maxPurchases:1,prerequisite:"Engineering Rank 4",isAdvanced:!0,description:"Advanced engineering production. See Production section for details."},{id:"evasion",name:"Evasion",spCost:0,maxPurchases:1,prerequisite:"Disable Device Rank 10",isAdvanced:!0,description:"Reduces damage suffered from traps and Area of Effect attacks (with numerical values) by half."},{id:"farmer_major",name:"Farmer, Major",spCost:5,maxPurchases:1,prerequisite:"Farmer, Standard",isAdvanced:!0,description:"Operate a Node and collect the most Herb/Food components. Can Refine and Extract components. See Harvesting section for details."},{id:"knowledge_area_rare",name:"Knowledge Area, Rare",spCost:3,maxPurchases:5,prerequisite:"See Skill Description",isAdvanced:!0,description:"Access rare/specialized knowledge areas. Requirements vary per area. Consult local plot team."},{id:"memorize_ritual",name:"Memorize Ritual",spCost:2,maxPurchases:"unlimited",prerequisite:"Ritualism",isAdvanced:!0,description:"Memorize a Ritual Scroll — cast that Ritual without needing a physical scroll. Must meet all casting prerequisites. No instructor required. Destroys the scroll upon memorization."},{id:"miner_major",name:"Miner, Major",spCost:5,maxPurchases:1,prerequisite:"Miner, Standard",isAdvanced:!0,description:"Operate a Node and collect the most Ore components. Can Refine and Extract components. See Harvesting section for details."},{id:"planar_scholar",name:"Planar Scholar",spCost:2,maxPurchases:5,prerequisite:"Not eligible for Crowns instruction",isAdvanced:!0,description:"Apply knowledge from the Prime to any other Prime shard by accounting for subtle differences. Each rank allows application of relevant common knowledge skills of the same rank to other planes."},{id:"practitioner",name:"Practitioner",spCost:8,maxPurchases:1,prerequisite:"Healing Arts",isAdvanced:!0,description:"Improved Healing Arts: 15 minutes treating up to 3 targets at once, also removes Curses. Alternatively: 10 minutes for one effect. Can also identify and temporarily suppress one of a character's Derangements for up to 6 hours."},{id:"profession_1st",name:"Profession (1st)",spCost:3,maxPurchases:5,isAdvanced:!0,description:"A set of 5 ranked skills reflecting study in a chosen field. Each rank has different abilities. Ranks must be purchased in order. See Professions page for available professions and details."},{id:"profession_2nd",name:"Profession (2nd)",spCost:5,maxPurchases:5,prerequisite:"1 other profession",isAdvanced:!0,description:"Second profession at increased cost per rank. See Professions page for details."},{id:"profession_3rd",name:"Profession (3rd)",spCost:7,maxPurchases:5,prerequisite:"2 other professions",isAdvanced:!0,description:"Third profession at further increased cost per rank. See Professions page for details."},{id:"repair_item",name:"Repair Item",spCost:0,maxPurchases:1,prerequisite:"Smithing or Engineering Rank 3",isAdvanced:!0,description:"2 minute counted action to field repair: 2 Common Ore removes Breached status from armor; 1 Uncommon Ore removes Broken status from an item. Does not restore special properties from Advanced Smithing/Engineering. No component cost at a Forge."},{id:"ritualism",name:"Ritualism",spCost:5,maxPurchases:1,prerequisite:"Knowledge Area Rank 4",isAdvanced:!0,description:"Use Ritual Scrolls to cast rituals (requires at least 4 ranks of appropriate Knowledge Area). Required to participate as a secondary caster in any ritual."},{id:"scribe_scroll_5",name:"Scribe Scroll Rank 5",spCost:8,maxPurchases:1,prerequisite:"Scribe Scroll Rank 4",isAdvanced:!0,description:"Advanced scroll production. See Production section for details."},{id:"smithing_5",name:"Smithing Rank 5",spCost:8,maxPurchases:1,prerequisite:"Smithing Rank 4",isAdvanced:!0,description:"Advanced smithing production. See Production section for details."},{id:"theurgist_major",name:"Theurgist, Major",spCost:5,maxPurchases:1,prerequisite:"Theurgist, Standard",isAdvanced:!0,description:"Operate a Node and collect the most Residuum components. Can Refine and Extract components. See Harvesting section for details."}],S=[{id:"resist_impairment",name:"Resist Impairment",spCost:3,maxPurchases:"unlimited",prerequisite:"Rok'Shen",description:"Once each reset per purchase: resist a single impairing attack — Slow, Pin, Bind, Web, Repel, Stun (others may apply)."},{id:"resist_magic",name:"Resist Magic",spCost:6,maxPurchases:"unlimited",prerequisite:"Deep Elf, Deep Dwarf, or Pixie",description:"Once each reset per purchase: resist a single magical effect that is a Spell cast by Incant or with the Magic Delivery Type."},{id:"resist_toxin",name:"Resist Toxin",spCost:4,maxPurchases:"unlimited",prerequisite:"Felis, Hill Dwarf, or Myconid",description:"Once each reset per purchase: resist a single Poison Delivery or Disease Family attack."},{id:"regeneration",name:"Regeneration",spCost:3,maxPurchases:"unlimited",prerequisite:"Half-Troll",description:"3 counted action, once each reset per purchase. Choose one: Heal 10 (becomes Heal 20 at 10th level), Cure Metabolic, or Regenerate. Character must be Conscious; usable even if denied abilities."},{id:"resist_metabolic",name:"Resist Metabolic",spCost:4,maxPurchases:"unlimited",prerequisite:"Exemplar",description:"Once each reset per purchase: resist a single Metabolic attack."},{id:"poison_blind_aura",name:"Poison Blind Aura",spCost:4,maxPurchases:"unlimited",prerequisite:"Myconid",description:"Once each reset per purchase: activate a Poison Blind Aura. See Myconid species page for full details."},{id:"resist_mental",name:"Resist Mental",spCost:3,maxPurchases:"unlimited",prerequisite:"Gnome, or High/Desert/Forest Elf",description:"Once each reset per purchase: resist a single Mental attack. Cannot resist: Enslavement, Feeblemind, Forget, Horrify, and Slumber."},{id:"camouflage",name:"Camouflage",spCost:4,maxPurchases:"unlimited",prerequisite:"Ent",description:"Functions like Conceal but: must be touching a tree larger than the player in width, OR surrounded by bushes and plants. Cannot move while active. Duration: 1 minute."},{id:"battle_rage",name:"Battle Rage",spCost:8,maxPurchases:"unlimited",prerequisite:"Orc or Forest Elf",description:"For one encounter: +15 BP, +2 Permanent Weapon Damage, Immunity to Charm/Fear/Shun/Sleep. When Battle Rage ends: suffer Devastate and Slow, and cannot use Energy for 30 minutes."},{id:"resist_elemental",name:"Resist Elemental",spCost:3,maxPurchases:"unlimited",prerequisite:"Elementalkin (Djinn, Efreeti, Gargoyle, or Triton)",description:"Once each reset per purchase: resist a single Elemental attack."},{id:"burst_of_strength",name:"Burst of Strength",spCost:6,maxPurchases:"unlimited",prerequisite:"Fae Troll",description:"Rip free of any Binding effect including Prison (still takes damage as if ripped out normally). Can also be used to run with a downed comrade, hold someone in a binding strike effect, or other thematically appropriate uses (Plot Marshal approval)."}],C={champion:[{id:"champ_focus_1",name:"Focus +1",spCost:15,maxPurchases:1,description:"Adds 1 point to base weapon damage with any proficient weapon. Purchased per hand; does not stack on two-handed weapons."},{id:"champ_focus_2",name:"Focus +2",spCost:15,maxPurchases:1,prerequisite:"Focus +1",description:"Cumulative +2 Focus damage (total). Purchased per hand."},{id:"champ_focus_3",name:"Focus +3",spCost:15,maxPurchases:1,prerequisite:"Focus +2",description:"Cumulative +3 Focus damage (total). Purchased per hand."},{id:"champ_focus_4",name:"Focus +4",spCost:20,maxPurchases:1,prerequisite:"Focus +3",description:"Cumulative +4 Focus damage (total). Purchased per hand."},{id:"champ_large_shield",name:"Large Shield",spCost:7,maxPurchases:1,description:"Proficiency with Large Shields. Champions are the only Fighter archetype that can learn this without a Power."},{id:"champ_energy",name:"Energy (1-16)",spCost:1,maxPurchases:16,description:"Each purchase adds 1 Energy."},{id:"champ_energy_high",name:"Energy (17-32)",spCost:2,maxPurchases:16,prerequisite:"16 Energy",description:"Each purchase adds 1 Energy at higher cost."},{id:"champ_energy_top",name:"Energy (33-38)",spCost:3,maxPurchases:6,prerequisite:"32 Energy",description:"Each purchase adds 1 Energy at highest cost."},{id:"champ_taunt",name:"Taunt",spCost:6,maxPurchases:"unlimited",description:'After a successful melee strike: "Voice (target) Taunt". Target pays twice the cost for abilities used against anyone other than the Taunter. Lasts 5 minutes, one encounter, or until Taunter disengages/flees.'},{id:"champ_t_deflect",name:"Technique: Deflect",spCost:2,maxPurchases:1,description:'[1 Energy] "Deflect" — negate a single melee weapon attack with Physical, Natural, or Massive vector (no other Vector types). Can protect another within melee reach.'},{id:"champ_t_clarity",name:"Technique: Clarity",spCost:2,maxPurchases:1,description:"[1 Energy] Briefly harden the mind to Resist: Charm, Command, Sleep, and Terror."},{id:"champ_t_exhaustion",name:"Technique: Exhaustion Strike",spCost:2,maxPurchases:1,description:'[1 Energy] "Exhaustion Strike" — target can only walk and cannot benefit from Flee. One swing hit or miss.'},{id:"champ_t_weapon_ward",name:"Technique: Weapon Ward",spCost:2,maxPurchases:1,description:"[1 Energy] Negate a Disarm/Shatter effect targeting a hand-held object. Protects one item per use, even against multi-target effects."},{id:"champ_t_slowing_strike",name:"Technique: Slowing Strike",spCost:4,maxPurchases:1,description:'[2 Energy] "Slowing Strike" — Slows the target. One swing hit or miss.'},{id:"champ_t_parry",name:"Technique: Parry",spCost:4,maxPurchases:1,description:"[2 Energy] Negate any one Physical Vector melee weapon-delivered attack that successfully landed on the user."},{id:"champ_t_knockdown",name:"Technique: Knockdown",spCost:4,maxPurchases:1,description:'[2 Energy] "Massive Knockdown!" — target is hampered for 10 seconds: no Active Skills/Abilities, cannot walk. Works even if hitting hand-held items or costume. 2-handed melee or Large Shield only. One swing hit or miss.'},{id:"champ_t_vitality",name:"Technique: Vitality",spCost:4,maxPurchases:1,description:"[2 Energy] 30-second counted action: recover up to 10 Body Points. If used immediately after incapacitating a foe, it is instant."},{id:"champ_t_aura_blade",name:"Technique: Aura Blade",spCost:6,maxPurchases:1,description:"[3 Energy] Add Flavor Carrier Magic to weapon damage calls and +1 Base Damage for 5 minutes or one Encounter. Overrides any other flavor the weapon normally has."},{id:"champ_t_riposte",name:"Technique: Riposte",spCost:6,maxPurchases:1,description:"[3 Energy] Cause an attacker to suffer the effects of their own melee strike. Guarantees the Champion's safety regardless of outcome. Treated as Passive per Defensive Specialist class feature. Does not affect Riposted attacks."},{id:"champ_t_impunity",name:"Technique: Impunity",spCost:7,maxPurchases:1,description:'[4 Energy] "Impunity" — for 10 seconds all physical/natural attacks that could be defended with Parry are negated.'},{id:"champ_t_stun",name:"Technique: Stun Strike",spCost:7,maxPurchases:1,description:'[4 Energy] "Stun Strike" — target is Stunned for 10 minutes. One swing hit or miss.'},{id:"champ_shield_wall",name:"Shield Wall",spCost:3,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] Defensive stance: gain Damage Cap 5 for one Encounter or up to 5 minutes, or until Helpless. Cannot use Offensive Special Attacks while active."},{id:"champ_rugged",name:"Rugged",spCost:5,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] Resist a spell or Magic deliver effect that is not Binding/Contain. When resisted: suffer 5 Body Points damage and Slowed for the encounter instead of the effect."},{id:"champ_patch_job",name:"Patch Job",spCost:2,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] 10-second counted action: set a suit of armor to its full value, removing Breached status."},{id:"champ_phalanx",name:"Phalanx",spCost:3,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] Grant up to 4 shield-wielding targets 10 points of armor above their maximum. Lasts one Encounter or up to 5 minutes."},{id:"champ_recovery",name:"Recovery",spCost:3,maxPurchases:1,isAdvanced:!0,description:"Increase healing received from Expendable Healing effects by 5 points. If also has Toughen power, bonus increases to +10 total. Can only be purchased once."},{id:"champ_die_hard",name:"Die Hard",spCost:3,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] At -1 Body Points: continue acting until negative Body Points equal unadjusted maximum BP, then enter Dying state with only a 60-count Bleed Out. Ends if healed above 0 BP."},{id:"champ_destructive",name:"Destructive Blow",spCost:4,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:'[Daily] "Destroy <target item> Strike" — destroys one weapon, shield (up to Large), suit of armor, or similar object, giving it the Broken status. Cannot target portions of objects or natural weaponry. One swing hit or miss.'},{id:"champ_bolster",name:"Bolster",spCost:7,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] For 5 minutes or 1 encounter: every hit the Champion blocks (via Deflect, Parry, Riposte, Impunity, or shield skill) heals 1 Body Point. Cannot exceed maximum Body."},{id:"champ_take_cover",name:"Take Cover",spCost:6,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] Grant everyone on your side of a module one use of Resist Ranged (avoids any ranged attack except Voice vector). Lasts remainder of the module."},{id:"champ_woven_defense",name:"Woven Defense",spCost:4,maxPurchases:"unlimited",isAdvanced:!0,prerequisite:"Daily",description:'[Daily per purchase] "Voice Enemies Weakness Burst" — wears down nearby enemies. Once per purchase.'}],trooper:[{id:"trp_focus_1",name:"Focus +1",spCost:15,maxPurchases:1,description:"+1 to base weapon damage with all proficient weapons. Purchased per hand."},{id:"trp_focus_2",name:"Focus +2",spCost:15,maxPurchases:1,prerequisite:"Focus +1",description:"Cumulative +2 Focus (total)."},{id:"trp_focus_3",name:"Focus +3",spCost:15,maxPurchases:1,prerequisite:"Focus +2",description:"Cumulative +3 Focus (total)."},{id:"trp_focus_4",name:"Focus +4",spCost:20,maxPurchases:1,prerequisite:"Focus +3",description:"Cumulative +4 Focus (total)."},{id:"trp_focus_5",name:"Focus +5",spCost:20,maxPurchases:1,prerequisite:"Focus +4",description:"Cumulative +5 Focus (total)."},{id:"trp_focus_6",name:"Focus +6",spCost:20,maxPurchases:1,prerequisite:"Focus +5",description:"Cumulative +6 Focus (total)."},{id:"trp_energy",name:"Energy (1-16)",spCost:1,maxPurchases:16,description:"Each purchase adds 1 Energy. Troopers gain 2 free Energy at level 1 and 2 more at level 20 (Jack of All Trades), which can exceed the 48 Energy cap."},{id:"trp_energy_mid",name:"Energy (17-32)",spCost:2,maxPurchases:16,prerequisite:"16 Energy",description:"Each purchase adds 1 Energy at higher cost."},{id:"trp_energy_high",name:"Energy (33-48)",spCost:3,maxPurchases:16,prerequisite:"32 Energy",description:"Each purchase adds 1 Energy at highest cost. Cap is 48 (plus Jack of All Trades bonus)."},{id:"trp_t_execute",name:"Technique: Execute",spCost:2,maxPurchases:1,description:"[1 Energy] Cause a Helpless target to become Dead and begin their death count. Legal weapon blow, one swing hit or miss."},{id:"trp_t_weapon_ward",name:"Technique: Weapon Ward",spCost:2,maxPurchases:1,description:"[1 Energy] Negate any Disarm/Shatter effect targeting a hand-held object. Protects one item per use."},{id:"trp_t_deflect",name:"Technique: Deflect",spCost:2,maxPurchases:1,description:"[1 Energy] Negate a single melee weapon attack (Physical/Natural/Massive vector only) on self or ally within reach."},{id:"trp_t_disarm",name:"Technique: Disarm",spCost:2,maxPurchases:1,description:"[1 Energy] Targeted hand-held item unusable for 5 seconds. Legal weapon strike or direct item contact."},{id:"trp_t_parry",name:"Technique: Parry",spCost:4,maxPurchases:1,description:"[2 Energy] Negate any one Physical Vector melee weapon-delivered attack that successfully landed on the user."},{id:"trp_t_maim",name:"Technique: Maim Limb",spCost:4,maxPurchases:1,description:'[2 Energy] "Maim <Limb>" — damages target limb making it useless until cured. Attacker chooses limb. Melee only, one swing hit or miss.'},{id:"trp_t_vitality",name:"Technique: Vitality",spCost:4,maxPurchases:1,description:"[2 Energy] 30-second counted action: recover up to 10 Body Points. If used immediately after incapacitating a foe, instant."},{id:"trp_t_stun",name:"Technique: Stun Strike",spCost:6,maxPurchases:1,description:'[3 Energy] "Stun Strike" — target Stunned for 10 minutes. One swing hit or miss.'},{id:"trp_t_aura_blade",name:"Technique: Aura Blade",spCost:6,maxPurchases:1,description:"[3 Energy] Add Flavor Carrier Magic to weapon damage and +1 Base Damage for 5 minutes or one Encounter. Overrides other flavors."},{id:"trp_t_blitz",name:"Technique: Blitz",spCost:6,maxPurchases:1,description:"[3 Energy] +5 Temporary Weapon Damage on next 4 weapon swings. Must be used on all swings following activation; each is one swing hit or miss."},{id:"trp_t_slay",name:"Technique: Slay Strike",spCost:7,maxPurchases:1,description:'[4 Energy] "Slay Strike" — target suffers a Slay effect. One swing hit or miss.'},{id:"trp_t_brutal",name:"Technique: Brutal Strike",spCost:7,maxPurchases:1,description:'[4 Energy] "Brutal Strike" — legal melee attack. Target takes 10 points of physical damage every time the  damage with Massive Prefix. Great Weapons only."},{id:"war_t_war_cry",name:"Technique: War Cry",spCost:7,maxPurchases:1,description:'[4 Energy] "All allies in the sound of my voice, War Cry" — allied next technique costs 1 less Energy. Does not affect user. Lasts 5 minutes or one Encounter, or until Energy is used. Spellcasters reduce spell cost by 2 mana instead.'},{id:"war_die_hard",name:"Die Hard",spCost:3,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] At -1 Body Points: continue acting until negative BP equals unadjusted max BP, then enter Dying with only a 60-count Bleed Out. Ends if healed above 0 BP."},{id:"war_recovery",name:"Recovery",spCost:4,maxPurchases:1,isAdvanced:!0,description:"Increase healing from Expendable Healing effects by 5 points. +10 total if also has Toughen power. Can only be purchased once."},{id:"war_stare_down",name:"Stare Down",spCost:3,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:'[Daily] Two uses: (1) "<Target> Voice Physical Fear" on a target within melee reach; (2) force a Conscious Helpless target to truthfully answer one yes/no question.'},{id:"war_patch_job",name:"Patch Job",spCost:2,maxPurchases:1,isAdvanced:!0,description:"10-second counted action: set a suit of armor to full value, removing Breached status."},{id:"war_bull_rush",name:"Bull Rush",spCost:8,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] Charge into the next Encounter — removes up to 1 defense from up to 10 target enemies."},{id:"war_intimidate",name:"Intimidate",spCost:3,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:'[Daily] Two uses: (1) "<Target> Voice Terror" on a target within melee reach; (2) force a Conscious Helpless target to truthfully answer one yes/no question.'}],monk:[{id:"monk_focus_1",name:"Focus +1",spCost:20,maxPurchases:1,description:"+1 to base weapon damage with all proficient weapons. Purchased per hand; does not stack on two-handed weapons. One Body One Mind c ounted action: heal 10 Body Points per Energy expended."},{id:"monk_t_elemental_strike",name:"Technique: Elemental Strike",spCost:3,maxPurchases:1,description:"[2 Energy] Gain 4 Blade Effects with +5 Temporary Weapon Damage in chosen element (Fire/Stone/Water/Wind). Must be used on following attacks. Each Blade Effect lasts until a legal weapon blow lands. Brawl weapons only."},{id:"monk_t_evade",name:"Technique: Evade",spCost:3,maxPurchases:1,description:"[2 Energy] Negate any attack with a numerical damage value, excluding attacks with the Surprise Prefix."},{id:"monk_t_maim",name:"Technique: Maim Limb",spCost:3,maxPurchases:1,description:'[2 Energy] "Maim <Limb>" — damages target limb making it useless until cured. Attacker chooses limb. Melee only, one swing hit or miss.'},{id:"monk_t_roundhouse",name:"Technique: Roundhouse",spCost:3,maxPurchases:1,description:'[2 Energy] "Cleave" — duplicate the effect of a legal weapon attack onto a second target (cannot target the same individual). Cannot be used with Burst or Double Attack.'},{id:"monk_t_catch",name:"Technique: Catch",spCost:6,maxPurchases:1,description:"[3 Energy] Defend against a single physical ranged attack (Ranged Weapon, Bomb, Vial, or Natural Delivery). Ends the attack; cannot do anything with the negated attack. Brawl weapons only."},{id:"monk_t_choke_hold",name:"Technique: Choke Hold",spCost:6,maxPurchases:1,description:'[3 Energy] "Silent Stun Strike" — deliver a quick subduing attack. Brawl weapons only. Does not function with Chi Strike.'},{id:"monk_t_sweep",name:"Technique: Sweep",spCost:6,maxPurchases:1,description:"[3 Energy] Force all targets within melee range back 10 feet; prevents them approaching for 5 seconds. Character must be stationary. Can move immediately after use. Great or Brawl weapons only."},{id:"monk_t_paralyzing",name:"Technique: Paralyzing Strike",spCost:6,maxPurchases:1,description:'[3 Energy] "Paralyzing Strike" — target becomes Paralyzed. Single weapon swing hit or miss.' th",name:"Grasping Earth",spCost:5,maxPurchases:1,description:'"All enemies in the sound of my voice Difficult Terrain". Calls on nature\'s forces in combat.'},{id:"guard_telltale",name:"Telltale Signs",spCost:3,maxPurchases:1,prerequisite:"Tracking 1",description:"When not in a city, automatically add 2 successes to any tracking attempt."},{id:"guard_t_deflect",name:"Technique: Deflect",spCost:2,maxPurchases:1,description:'[1 Energy] "Deflect" — negate a single melee weapon attack (Physical/Natural/Massive vector only). Can protect another within melee reach. Passive per Heart of the Wild when wielding two weapons or a Great Weapon.'},{id:"guard_t_move_silent",name:"Technique: Move Silent",spCost:2,maxPurchases:1,description:'[1 Energy] Passive. Move up to 15 steps while in Hide and remain Hidden; OR make one attack from Hide adding "Surprise" modifier and remain Hidden.'},{id:"guard_t_shatter",name:"Technique: Shatter Strike",spCost:2,maxPurchases:1,description:'[1 Energy] "Shatter <item> Strike" — renders useless one weapon/medium shield (or smaller), giving it Broken status. Against armor: reduces to 0 (Breach). Cannot target portions of objects or natural weaponry. One swing hit or miss.'},{id:"guard_t_exhaustion",name:"Technique: Exhaustion Strike",spCost:2,maxPurchases:1,description:'[1 Energy] "Exhaustion Strike" — target can only walk and cannot benefit from Flee. One swing hit or miss.'},{id:"guard_t_parry",name:"Technique: Parry",spCost:4,maxPurchases:1,description:"[2 Energy] Negate any one Physical Vector melee weapon-delivered attack that successfully landed on the user. Passive per Heart of the Wild."},{id:"guard_t_roll",name:"Technique: Roll",spCost:4,maxPurchases:1,description:"[2 Energy] Defend against a weapon or packet attack with numerical damage — take only half damage (rounded down) and remove effect carriers. Passive per Heart of the Wild."},{id:"guard_t_entangle",name:"Technique: Entangling Strike",spCost:4,maxPurchases:1,description:'[2 Energy] "Entangle Strike" — duplicates the Entangle spell effect delivered via weapon swing. One swing hit or miss.'},{id:"guard_t_maim",name:"Technique: Maim Limb",spCost:4,maxPurchases:1,description:'[2 Energy] "Maim <Limb>" — damages target limb making it useless until cured. Attacker chooses limb; if body hit or no limb specified, defender chooses (cannot choose already-maimed limb). Melee only, one swing hit or miss.'},{id:"guard_t_riposte",name:"Technique: Riposte",spCost:6,maxPurchases:1,description:"[3 Energy] Cause attacker to suffer the effects of their own melee strike. Guarantees Guardian's safety regardless of outcome. Passive per Heart of the Wild. Does not affect Riposted attacks."},{id:"guard_t_ambush",name:"Technique: Ambush",spCost:6,maxPurchases:1,description:'[3 Energy] "Ambush" — target unconscious for 10 minutes. From behind: "Ambush Surprise". Metabolic effect. Melee boffer only.'},{id:"guard_t_stun",name:"Technique: Stun Strike",spCost:6,maxPurchases:1,description:'[3 Energy] "Stun Strike" — target Stunned for 10 minutes. One swing hit or miss.'},{id:"guard_t_conceal",name:"Technique: Conceal",spCost:7,maxPurchases:1,description:'[4 Energy] "Conceal!" — instantly become Hidden. Cannot move (other than minor shifting). Hands in front of chest while hidden. Up to 1 hour. Leaving takes a 5 counted action.'},{id:"guard_t_dodge",name:"Technique: Dodge",spCost:7,maxPurchases:1,description:"[4 Energy] Avoid a single ranged weapon or packet-delivered attack that strikes the character. Cancels the attack completely. Passive per Heart of the Wild."},{id:"guard_t_slay",name:"Technique: Slay Strike",spCost:7,maxPurchases:1,description:'[4 Energy] "Slay Strike" — target suffers 100 points of critical damage. Slay effect. One swing hit or miss.'},{id:"guard_aerial_totem",name:"Aerial Totem",spCost:6,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:'[Daily] Summon aerial creature totem for 1 hour or Module (1 active totem at a time). Choose one: a  outcome. Does not affect Riposted attacks."},{id:"sb_t_stun",name:"Technique: Stun Strike",spCost:6,maxPurchases:1,description:'[3 Energy] "Stun Strike" — target Stunned for 10 minutes. One swing hit or miss.'},{id:"sb_t_slay",name:"Technique: Slay Strike",spCost:7,maxPurchases:1,prerequisite:"Cannot have Overpower",description:'[4 Energy] "Slay Strike" — target suffers 100 points of critical damage. Slay effect. One swing hit or miss.'},{id:"sb_t_overpower",name:"Technique: Overpower",spCost:7,maxPurchases:1,prerequisite:"Cannot have Slay Strike",description:"[4 Energy] Next 4 weapon swings deal double damage with Massive prefix. Great Weapons only."},{id:"sb_ley",name:"Ley Points (max 15)",spCost:2,maxPurchases:15,description:"Each purchase = 1 Ley Point. Max 15 total. Fuels Metamagic. Interchangeable with Energy via Source Mixing."},{id:"sb_mm_aura",name:"Metamagic: Aura Emulation",spCost:2,maxPurchases:1,description:'[1 Ley Point] Active defense on successful melee hit: "Magic Aura <Flavor>" — 30 points damage to attacker. Cannot be used against Surprise. Blocked by Dodge/Parry/Magic Shield.'},{id:"sb_mm_overload",name:"Metamagic: Overload",spCost:2,maxPurchases:1,description:"[1 Ley Point] Add Critical Modifier to a single spell or current Spell Pool."},{id:"sb_mm_penetrating",name:"Metamagic: Penetrating Magic",spCost:3,maxPurchases:1,prerequisite:"One other metamagic skill",description:'[2 Ley Points] Append "body" to incant — punches through armor. Can be applied to Spell Pool (cost paid per application).'},{id:"sb_mm_elemental",name:"Metamagic: Elemental Spell",spCost:3,maxPurchases:1,prerequisite:"One other metamagic skill",description:'[2 Ley Points] "Elemental <Flavor> <Effect>" — powerful against opposing-element targets.'},{id:"sb_mm_revitalize",name:"Metamagic: Revitalize",spCost:4,maxPurchases:1,prerequisite:"Two other metamagic skills",description:"[1 Ley Point per 5 mana] Break down Ley Points into raw mana (1 LP = 5 mana). Max replenishment = base pool (up to 70 extra mana per event). Ley Skills become unavailable for that event."},{id:"sb_barrier",name:"Barrier",spCost:3,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] Funnel magic into a 20-point damage-absorbing barrier. Cannot be readjusted; stacks with other temporary armor but is lost first."},{id:"sb_ignite_magic",name:"Ignite Magic",spCost:6,maxPurchases:"unlimited",isAdvanced:!0,prerequisite:"Daily",description:"[Daily per purchase] Gain 25 Spell Pool and sacrifice up to 10 mana for +5 Spell Pool each (up to +50 total). Lasts 5 minutes or one Encounter; refreshes with normal Spell Pool for duration."},{id:"sb_planar_repulsion",name:"Planar Repulsion",spCost:4,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] Channel elemental energy to push creatures back to their home plane — allow party of up to 10 to bypass an encounter. Works only on Constructs, Elementals, and Outsiders."},{id:"sb_source_mixing",name:"Source Mixing",spCost:8,maxPurchases:1,isAdvanced:!0,prerequisite:"Any 2 Ley Skills and Techniques",description:"Use Energy and Ley Points interchangeably: spend 1 more of one resource in place of the other. E.g. 3 Ley Points to use Parry, or 2 Energy to use Aura Emulation."}],rogue:[{id:"rog_prec_2",name:"Precision +2",spCost:15,maxPurchases:1,description:"+2 damage from behind. Purchased per hand."},{id:"rog_prec_4",name:"Precision +4",spCost:15,maxPurchases:1,prerequisite:"Precision +2",description:"Cumulative +4 precision damage (total)."},{id:"rog_prec_6",name:"Precision +6",spCost:15,maxPurchases:1,prerequisite:"Precision +4",description:"Cumulative +6 precision damage (total)."},{id:"rog_prec_8",name:"Precision +8",spCost:20,maxPurchases:1,prerequisite:"Precision +6",description:"Cumulative +8 precision damage (total)."},{id:"rog_prec_10",name:"Precision +10",spCost:20,maxPurchases:1,prerequisite:"Precision +8",description:"Cumulative +10 precision damage (total)."},{id:"rog_prec_12",name:"Precision +12",spCost:20,maxPurchases:1,prerequisite:"Precision +10",description:'Cumulative +12 precision damage from behind. Max 6 purchases = "Fourteen Normal".'},{id:"rog_energy",name:"Energy (1-40)",spCost:1,maxPurchases:40,description:"Each purchase adds 1 Energy."},{id:"rog_garrote",name:"Garrote",spCost:2,maxPurchases:1,description:'[1 Energy] "Silence Strike" — Silences target. From Hide: "Surprise Silence Strike". Melee only, one swing hit or miss.'},{id:"rog_feint",name:"Feint",spCost:2,maxPurchases:1,description:"[1 Energy] Add the Body Modifier to next 2 melee weapon attacks, hit or miss."},{id:"rog_mob_scene",name:"Mob Scene",spCost:2,maxPurchases:1,description:"[1 Energy] All allies within melee weapon reach add the Critical Flavor Carrier to their next single attack."},{id:"rog_sneak_attack",name:"Sneak Attack",spCost:3,maxPurchases:1,prerequisite:"Tier 1 Offense",description:'[2 Energy] Add "Surprise" modifier to weapon call. From front: add all Precision bonus damage. From behind: double normal damage call. Next 2 weapon swings affected; both one swing hit or miss.'},{id:"rog_cheap_shot",name:"Cheap Shot",spCost:3,maxPurchases:1,prerequisite:"Tier 1 Offense",description:"[2 Energy] Minor interrupt — negates the last active skill/ability the opponent used (not expended, can be used again). Can only be used on attacks targeting someone other than the character using it."},{id:"rog_crippling_attack",name:"Crippling Attack",spCost:3,maxPurchases:1,prerequisite:"Tier 1 Offense",description:'[2 Energy] "Crippling Strike" — target cannot move faster than a walk for the rest of the encounter. Single swing hit or miss.'},{id:"rog_ambush",name:"Ambush",spCost:6,maxPurchases:1,prerequisite:"Tier 2 Offense",description:'[3 Energy] "Ambush" — target unconscious for 10 minutes. From behind: "Ambush Surprise". Metabolic. Melee boffer only.'},{id:"rog_blind",name:"Blind",spCost:6,maxPurchases:1,prerequisite:"Tier 2 Offense",description:'[3 Energy] "<Target> Voice Poison ifting). Hands in front of chest. Up to 1 hour. Leaving takes a 5 counted action.'},{id:"rog_dodge",name:"Dodge",spCost:7,maxPurchases:1,prerequisite:"Tier 3 Defense",description:"[4 Energy] Avoid a single ranged weapon or packet-delivered attack that strikes the character. Cancels the attack completely."},{id:"rog_hide",name:"Hide",spCost:6,maxPurchases:1,description:"Become Hidden from normal view. Must be next to a stationary object larger than the player. 5 counted action to enter/exit. Cannot move. Up to 1 hour."},{id:"rog_disable_device",name:"Disable Device",spCost:2,maxPurchases:10,description:"Use/understand locks, traps, puzzles, tools, and mechanical devices via Contested Roll + 2 minutes concentration. 30 seconds to analyze object level. Each rank +1 Bonus to Contested Rolls."},{id:"rog_agility",name:"Agility",spCost:6,maxPurchases:1,description:'[Daily] "Agility!" — Reduced: Half Damage (rounded up) from all numerical damaging effects for 5 minutes or 1 Encounter. Does not reduce non-damage effects.'},{id:"rog_stash",name:"Stash",spCost:3,maxPurchases:1,description:'[Daily] Hide an object (max 1 cu.ft.) for up to 3 hours with a "Stash" tag. Detectable only by Track rank 10+ via Contested Roll (treated as 10 levels of counter tracking).'},{id:"rog_sap",name:"Sap",spCost:2,maxPurchases:1,description:"[Daily] From Hide or Conceal only. Target unaware of surroundings up to 5 minutes. Breaks on any offensive interaction; can be searched on a 30-count or carried at slow walk. From Hide: move 10 steps to arm's reach calling Sap Surprise without breaking Hide (unless it fails). One target at a time."},{id:"rog_quickness",name:"Quickness",spCost:2,maxPurchases:1,description:"[Daily] Passive Temporary Reduction: 60+ seconds = 50%; 60 count = 30 count; 30 count = 3 count; 3 count = 1 count. Cannot stack with itself."},{id:"rog_disguise",name:"Disguise",spCost:4,maxPurchases:1,isAdvanced:!0,description:'[Daily] Once per reset. Give a false answer to "What do I see? otal)."},{id:"rang_energy",name:"Energy (1-20)",spCost:1,maxPurchases:20,description:"Each purchase adds 1 Energy."},{id:"rang_energy_high",name:"Energy (21-40)",spCost:2,maxPurchases:20,prerequisite:"20 Energy",description:"Each purchase adds 1 Energy at higher cost."},{id:"rang_pierce",name:"Pierce",spCost:3,maxPurchases:1,description:'[1 Energy] Append "Pierce" to a bow attack — arrow takes effect on a hit to a shield.'},{id:"rang_disarm_shot",name:"Disarm Shot",spCost:3,maxPurchases:1,description:'[1 Energy] "Disarm Shot <item>" — packet-delivered. Targeted hand-held item unusable for 5 seconds. Must hit the item directly.'},{id:"rang_mob_scene",name:"Mob Scene",spCost:3,maxPurchases:1,description:"[1 Energy] All allies within melee weapon reach add the Critical Modifier to their next single attack."},{id:"rang_trick_t1",name:"Trick Arrow T1",spCost:3,maxPurchases:1,description:"[1 Energy] Launch a Tier 1 Trick Arrow created by Bowyer/Fletcher (Elemental Shot, Dipped, Tuning Fork)."},{id:"rang_crippling_shot",name:"Crippling Shot",spCost:4,maxPurchases:1,prerequisite:"Any Tier 1 Offense",description:'[2 Energy] "Crippling Shot" — packet-delivered. Target cannot move faster than a walk for the encounter and cannot use Flee.'},{id:"rang_expose_armor",name:"Expose Armor",spCost:4,maxPurchases:1,prerequisite:"Any Tier 1 Offense",description:'[2 Energy] "Voice Expose Armor" — reduces target physical armor to 0 (does not Breach). Can be negated with Weapon Ward.'},{id:"rang_manticore_shot",name:"Manticore Shot",spCost:3,maxPurchases:1,prerequisite:"Any Tier 1 Offense",description:'[2 Energy] Next 3 ranged attacks become "Poison Weakness". One shot hit or miss each.'},{id:"rang_pindown_shot",name:"Pindown Shot",spCost:3,maxPurchases:1,prerequisite:"Any Tier 1 Offense",description:'[2 Energy] "Pindown Shot" — packet-delivered. Sticks target to ground; ripping free is a 30-count action not affected by Strength. Can be escaped by normal binding-ending measures.'},{id:"rang_trick_t2",name:"Trick Arrow T2",spCost:3,maxPurchases:1,prerequisite:"Any Tier 1 Offense",description:"[2 Energy] Launch a Tier 2 Trick Arrow (Explosive Shot, Beacon)."},{id:"rang_paralyzing_shot",name:"Paralyzing Shot",spCost:5,maxPurchases:1,prerequisite:"Any Tier 2 Offense",description:"[3 Energy] Target becomes Paralyzed for 30 minutes — aware but cannot move, speak, or use active skills. Metabolic effect."},{id:"rang_streamlined_shot",name:"Streamlined Shot",spCost:5,maxPurchases:1,prerequisite:"Any Tier 2 Offense",description:'[3 Energy] Add Energy cost onto another shot to call "Double Attack" in response to a defended attack.'},{id:"rang_trick_t3",name:"Trick Arrow T3",spCost:5,maxPurchases:1,prerequisite:"Any Tier 2 Offense",description:"[3 Energy] Launch a Tier 3 Trick Arrow (Pinpoint)."},{id:"rang_weighted_shot",name:"Weighted Shot",spCost:5,maxPurchases:1,prerequisite:"Any Tier 2 Offense",description:"[3 Energy] Voice-delivered against a Flying Target. Forces immediate safe landing; target cannot fly again for 10 seconds."},{id:"rang_impale",name:"Impale",spCost:6,maxPurchases:1,prerequisite:"Any Tier 3 Offense",description:"[4 Energy] +2 Base Weapon Damage and add Critical Modifier to next 10 packet attacks."},{id:"rang_trick_t4",name:"Trick Arrow T4",spCost:6,maxPurchases:1,prerequisite:"Any Tier 3 Offense",description:"[4 Energy] Launch a Tier 4 Trick Arrow (Magnetic Shot, Stun Shot, Cloaking Shot)."},{id:"rang_mobility",name:"Mobility",spCost:3,maxPurchases:1,description:"[1 Energy] Resist/remove Slow, Pin, Bind, and Binding Strike up to +4 Strength. Also escapes non-magical bindings."},{id:"rang_initiative",name:"Initiative",spCost:3,maxPurchases:1,description:"[1 Energy] Minor hold for engaged players; move up to 10 steps away, then normal play resumes."},{id:"rang_roll",name:"Roll",spCost:3,maxPurchases:1,prerequisite:"Any Tier 1 Defense",description:"[2 Energy] Defend against a weapon or packet attack with numerical damage — half damage (rounded down), remove effect carriers."},{id:"rang_escape",name:"Escape",spCost:5,maxPurchases:1,prerequisite:"Any Tier 2 Defense",description:"[3 Energy] Instantly escape all movement-impairing and Binding effects (not Contain or Petrify). Can also free another target via touch + 5 counted action."},{id:"rang_avoidance",name:"Avoidance",spCost:6,maxPurchases:1,prerequisite:"Any Tier 3 Defense",description:'[4 Energy] "No Effect" to all melee weapon attacks against the character for 10 seconds. Can still attack with ranged weapons while active.'},{id:"rang_dodge",name:"Dodge",spCost:6,maxPurchases:1,prerequisite:"Any Tier 3 Defense",description:"[4 Energy] Avoid a single packet or bullet-delivered attack that strikes the character. Cancels the attack completely."},{id:"rang_hide",name:"Hide",spCost:6,maxPurchases:1,description:"Become Hidden from normal view. Must be next to a stationary object larger than the player. 5 counted action to enter/exit. Cannot move. Up to 1 hour."},{id:"rang_move_silent",name:"Move Silent",spCost:3,maxPurchases:1,prerequisite:"Hide",description:'[1 Energy] Passive. Move up to 15 steps while in Hide and remain Hidden; OR make one attack from Hide adding "Surprise" modifier and remain Hidden.'},{id:"rang_track",name:"Track",spCost:2,maxPurchases:30,description:"Detect and follow a target's passage via Contested Roll with a Marshal. Rangers may purchase Track up to 30 Ranks (vs normal 20 max). Each rank adds +1 Bonus to Contested Rolls."},{id:"rang_bowyer",name:"Bowyer/Fletcher",spCost:2,maxPurchases:4,description:"Rangers are trained in creating specific trick arrow effects. Each rank allows Trick Arrows up to that Tier. Tier 1: Elemental Shot (change flavor), Dipped (Poison Exhaustion), Tuning Fork (Physical Silence Shot). Tier 2: Explosive Shot (Critical tag), Beacon (trackable tag, 100 miles/Ranger level, 48hrs). Tier 3: Pinpoint (Body damage). Tier 4: Magnetic Shot (Voice deliver further arrows), Stun Shot (Physical Stun), Cloaking Shot (Physical Conceal — target Hidden and mobile for 10 seconds)."},{id:"rang_terrain",name:"Terrain Adaptation",spCost:5,maxPurchases:"unlimited",description:"Passive always-on attunement to a Terrain Type (Fire/Stone/Water/Wind or Prime environment). Ignores passive terrain effects; does not block active hazards. Can be purchased for multiple terrain types."},{id:"rang_agility",name:"Agility",spCost:6,maxPurchases:1,description:'[Daily] "Agility!" — Reduced: Half Damage (rounded up) from all numerical damaging effects for 5 minutes or 1 Encounter. Does not reduce non-damage effects.'},{id:"rang_conceal",name:"Conceal",spCost:5,maxPurchases:1,description:'[Daily] "Conceal!" — instantly become Hidden. Cannot move (other than minor shifting). Up to 1 hour. Leaving takes a 5 counted action.'},{id:"rang_high_inertia",name:"High Inertia",spCost:4,maxPurchases:1,description:'[Daily] "Double Attack" in response to a legally-defended arrow attack — second weight in shaft delivers a second kinetic jolt.'},{id:"rang_hunters_call",name:"Hunter's Call",spCost:3,maxPurchases:"unlimited",description:"[Daily per purchase] Summon an above-average intelligence animal native to the current terrain. Give it a complex command for up to 1 hour. Cannot be used in combat."},{id:"rang_sap",name:"Sap",spCost:2,maxPurchases:1,description:"[Daily] Incapacitate a target — cannot take action, unaware of surroundings, but not Helpless. Lasts up to 5 minutes; ends on any damage or violent movement."},{id:"rang_smoke_screen",name:"Smoke Screen",spCost:5,maxPurchases:1,description:'[Daily] Hands raised above head, announce "Smoke Screen" every few seconds for up to 30 seconds. Protects characters within melee reach from ranged attacks from outside melee range. Requires concentration; ends if Helpless or hands go down.'},{id:"rang_snare",name:"Snare",spCost:3,maxPurchases:1,description:"[Daily] Target suffers Natural Pin — cannot move."},{id:"rang_quickness",name:"Quickness",spCost:2,maxPurchases:1,description:"[Daily] Passive Temporary Reduction — reduce a counted action: 60+ seconds = 50% reduction; 60 count = 30 count; 30 count = 3 count; 3 count = 1 count. Cannot stack with itself."},{id:"rang_warning_signs",name:"Warning Signs",spCost:8,maxPurchases:1,description:"[Daily] Read tracks to spot danger ahead — allow party of up to 10 to bypass an encounter without engaging. Only works if another route exists."}],gunslinger:[{id:"gs_acc_1",name:"Accuracy +1",spCost:15,maxPurchases:1,description:"+1 to firearm damage. Applies to firearms only. Total Accuracy + base weapon damage cannot exceed 10 (except momentarily via Grit skills)."},{id:"gs_acc_2",name:"Accuracy +2",spCost:15,maxPurchases:1,prerequisite:"Accuracy +1",description:"Cumulative +2 Accuracy (total). Cap: Accuracy + base damage cannot exceed 10."},{id:"gs_acc_3",name:"Accuracy +3",spCost:15,maxPurchases:1,prerequisite:"Accuracy +2",description:"Cumulative +3 Accuracy (total)."},{id:"gs_acc_4",name:"Accuracy +4",spCost:20,maxPurchases:1,prerequisite:"Accuracy +3",description:"Cumulative +4 Accuracy (total)."},{id:"gs_acc_5",name:"Accuracy +5",spCost:20,maxPurchases:1,prerequisite:"Accuracy +4",description:"Cumulative +5 Accuracy (total)."},{id:"gs_acc_6",name:"Accuracy +6",spCost:20,maxPurchases:1,prerequisite:"Accuracy +5",description:"Cumulative +6 Accuracy (total). Maximum sustainable damage = Accuracy + base weapon damage, cap 10."},{id:"gs_grit",name:"Grit (1-40)",spCost:1,maxPurchases:40,description:"Each purchase adds 1 Grit. Grit is mechanically identical to Energy but specific to Gunslingers — prevents Energy Gems from interacting with Gunslinger abilities."},{id:"gs_trickshot",name:"Trickshot",spCost:3,maxPurchases:1,description:"[1 Grit] Guarantees a bullet lands exactly where intended on non-animate targets (cut ropes, push buttons, drop objects, etc.). No direct combat effect. No cost charged if marshal rules out of scope. Range: theoretical range of weapon rep (~40ft for standard Nerf Elite)."},{id:"gs_close_quarters",name:"Close Quarters",spCost:3,maxPurchases:1,prerequisite:"Trickshot",description:"[3 Grit] One use of Pierce on pistols per use for handling shields/closing gaps. Can also be tagged onto voice-delivered damage."},{id:"gs_disabling_shot",name:"Disabling Shot",spCost:4,maxPurchases:1,prerequisite:"Close Quarters",description:'[4 Grit] "Physical Maim <Limb>" — ruins connective tissue, disabling limb. Can ruin inorganic objects. Can be used as "Physical Disarm" if needed.'},{id:"gs_covered_advance",name:"Covered Advance",spCost:5,maxPurchases:1,prerequisite:"Disabling Shot",description:'[5 Grit] "Covered Advance" — thick smoke covers up to 3 friendlies, granting immunity to ranged attacks for 5 seconds. Affected persons must announce "Covered".'},{id:"gs_piercing_shot",name:"Piercing Shot",spCost:3,maxPurchases:1,description:'[2 Grit] Appends "Pierce" to verbal. Two options: up to 3 unmodified shots through a shield per activation; OR one modified shot through a shield (e.g. Killshot) once per activation.'},{id:"gs_called_shot",name:"Called Shot",spCost:3,maxPurchases:1,prerequisite:"Piercing Shot",description:"[2 Grit] Deliver up to double normal damage after modifiers — allows violating the Accuracy cap. Generally delivers 20 points."},{id:"gs_bulls_eye",name:"Bull's Eye",spCost:4,maxPurchases:1,prerequisite:"Called Shot",description:"[4 Grit] Alters one shot to Voice Delivery, adding Critical or Body carriers (chosen at time of use). Requires line of sight to target."},{id:"gs_killshot",name:"Killshot",spCost:5,maxPurchases:1,prerequisite:"Bull's Eye",description:'[5 Grit] "Physical Slay" — inflicts the Slay effect on one bullet. Blocked by shields in raw form. Combine with Piercing Shot or Bulls Eye to bypass.'},{id:"gs_roll",name:"Roll",spCost:2,maxPurchases:1,description:"[1 Grit] Defend against a weapon or packet attack with numerical damage — take only half damage (rounded down) and remove effect carriers."},{id:"gs_initiative",name:"Initiative",spCost:3,maxPurchases:1,prerequisite:"Roll",description:'[1 Grit] "Initiative" defense — retreat 10 steps in a straight line from nearest combatant. Not a valid melee target during movement; hand raised above head. Still valid for packets and voice effects. Cannot be followed.'},{id:"gs_countershot",name:"Countershot",spCost:4,maxPurchases:1,prerequisite:"Initiative",description:'[4 Grit] Called as "Evade" — defense against any damaging packet- or bullet-delivered attack. Must have a gun in hand.'},{id:"gs_tough",name:"Tough",spCost:5,maxPurchases:1,prerequisite:"Countershot",description:'[4 Grit] "Resist Physical" — blunts a physical beating.'},{id:"gs_warning_shot",name:"Warning Shot",spCost:2,maxPurchases:1,isAdvanced:!0,description:'[1 Grit] "Physical Fear Pierce" — bullet-delivered Fear that pierces shields (shields stop bullets, not panic).'},{id:"gs_safeties_off",name:"Safeties Off",spCost:2,maxPurchases:1,isAdvanced:!0,prerequisite:"Warning Shot",description:'[Daily] "Peaceful Aura" — normal people de-escalate. If enemies engage anyway, user can add the "Surprise" tag to their first attack of the ensuing encounter free of charge. Active skill; starts when invoked.'},{id:"gs_high_noon",name:"High Noon",spCost:4,maxPurchases:1,isAdvanced:!0,description:"[4 Grit] Calls out an enemy shooter for a duel — generates Taunt, but can only be used on enemies holding packets or guns at the time it is called."},{id:"gs_cold_blood",name:"Cold Blood",spCost:3,maxPurchases:1,isAdvanced:!0,description:"[Daily] Reflexive defense against Fear effects regardless of vector or delivery. Can also be used as a roleplay effect without being consumed when presenting as an amoral gun platform. Per-reset basis."},{id:"gs_gunsmithing",name:"Gunsmithing",spCost:1,maxPurchases:5,description:"Same as Engineering but only builds guns and ammo. Does not include explosive devices (use Engineering for those)."},{id:"gs_field_strip",name:"Field Strip",spCost:5,maxPurchases:1,isAdvanced:!0,description:"[1 Grit] Restore a broken/damaged/destroyed firearm to full working order. Free in 10 minutes, or rush to Instant for 1 Grit."},{id:"gs_holdout",name:"Holdout",spCost:1,maxPurchases:1,isAdvanced:!0,description:"[Daily] Produce a weapon when otherwise unarmed. Works for meetings, diplomatic events, and places that ban weapons but don't thoroughly search. Not reliable if thoroughly searched (e.g., in a cell)."},{id:"gs_lucky",name:"Lucky",spCost:5,maxPurchases:2,isAdvanced:!0,description:"[Daily per purchase] Alter any randomizer by up to 10% in the most favorable direction (tracking, healing, etc.). Can stack with itself once for 20% total max. Can apply to resurrection (with narrative consequences). Once per reset per purchase."},{id:"gs_quickdraw",name:"Quickdraw",spCost:2,maxPurchases:1,isAdvanced:!0,description:'[Daily] Override the "must have weapon in hand" restriction on Gunslinger skills. Weapon must still be on person. Allows Countershot and Trickshots without weapon in hand.'},{id:"gs_ricochet",name:"Ricochet",spCost:3,maxPurchases:1,isAdvanced:!0,prerequisite:"Tier 1 Pistol or Rifle skill",description:'[2 Grit] "Cleave" — duplicate the effect of a legal ranged weapon attack onto a second target (cannot target the same individual). Cannot be used with Burst or Double Attack. Ranged weapons only.'},{id:"gs_weapon_ward",name:"Weapon Ward",spCost:2,maxPurchases:1,isAdvanced:!0,description:"[1 Grit] Negate any Disarm/Shatter effect targeting a hand-held object. Protects one item per use, even against multi-target effects."},{id:"gs_fan_hammer",name:"Fan the Hammer",spCost:8,maxPurchases:1,isAdvanced:!0,description:'[Daily] Pistols only. Select up to 6 individuals within 20ft. Option 1: voice deliver damage +5 (violates Accuracy cap) to each target. Option 2: inflict a pistol special attack on each target ("Voice Physical <effect>"), paying Grit cost for one use of the chosen technique.'}],warlock:[{id:"wlk_mana",name:"Mana (1-30)",spCost:1,maxPurchases:15,manaPerPurchase:2,description:"Each purchase = 2 mana (1 SP per 2 mana up to 30). Fuels Void spells levels 1-9."},{id:"wlk_mana_high",name:"Mana (31-60)",spCost:1,maxPurchases:30,prerequisite:"30 Mana",description:"Each purchase = 1 mana at higher cost. Extends pool to 60."},{id:"wlk_sp_1",name:"Spell Pool I (Void)",spCost:0,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:'Free. 25 Spell Pool, cap 10 per use. Void flavor. "I summon X <damage type>", packet delivered in 5-point increments. Refreshes in 3 minutes or via 9th level Mage Evocation.'},{id:"wlk_sp_2",name:"Spell Pool II (Void)",spCost:5,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:"[5 SP] +25 Spell Pool. Cap increases to 15 per use."},{id:"wlk_sp_3",name:"Spell Pool III (Void)",spCost:10,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:"[10 SP] +25 Spell Pool. Cap increases to 20 per use."},{id:"wlk_spell_1",name:"Warlock Spell Lvl 1",spCost:1,maxPurchases:"unlimited",description:'[1 Mana] Void spells: Detect Magic, Exhaustion, Weakness. Default incant: "I call upon the void to curse you with <effect>".'},{id:"wlk_spell_2",name:"Warlock Spell Lvl 2",spCost:1,maxPurchases:"unlimited",description:"[2 Mana] Void spells: Pin, Fumble, Terror, Blade."},{id:"wlk_spell_3",name:"Warlock Spell Lvl 3",spCost:1,maxPurchases:"unlimited",description:"[3 Mana] Void spells: Repel, Blind, Fog, Maim Limb."},{id:"wlk_spell_4",name:"Warlock Spell Lvl 4",spCost:1,maxPurchases:"unlimited",description:"[4 Mana] Void spells: Awaken, Shun, Venom."},{id:"wlk_spell_5",name:"Warlock Spell Lvl 5",spCost:1,maxPurchases:"unlimited",description:"[5 Mana] Void spells: Silence, Terror Mask, Night."},{id:"wlk_spell_6",name:"Warlock Spell Lvl 6",spCost:1,maxPurchases:"unlimited",description:"[6 Mana] Void spells: Charm, Fear, Remove Curse."},{id:"wlk_spell_7",name:"Warlock Spell Lvl 7",spCost:1,maxPurchases:"unlimited",description:"[7 Mana] Void spells: Circle, Summon Weapon, Stun, Watchful Eye."},{id:"wlk_spell_8",name:"Warlock Spell Lvl 8",spCost:1,maxPurchases:"unlimited",description:"[8 Mana] Void spells: Dispel, Devastate, Command, Mind Guard."},{id:"wlk_spell_9",name:"Warlock Spell Lvl 9",spCost:1,maxPurchases:"unlimited",description:'[9 Mana] Void spells: Death Wail ("all enemies in the sound of my voice magic Fear"), Shadow Step (enter shadow, move 20 steps to another shadow, self only).'},{id:"wlk_ley",name:"Ley Magic Points (max 20)",spCost:2,maxPurchases:20,description:"Each purchase = 1 Ley Point. Max 20 total. Fuels Ley Magic skills."},{id:"wlk_mm_hasten",name:"Ley: Hasten Spell",spCost:2,maxPurchases:1,description:'[1 Ley Point] Cast spell as "Magic <spell name>" without normal incant. Changes Spell Pool delivery type to Magic.'},{id:"wlk_mm_penetrating",name:"Ley: Penetrating Magic",spCost:2,maxPurchases:1,description:'[1 Ley Point] Add "Body" modifier to next two uses of Spell Pool only (not full remaining pool).'},{id:"wlk_mm_forked",name:"Ley: Forked Spell",spCost:3,maxPurchases:1,description:'[2 Ley Points] Add "Forked" to end of incant, throw "Magic <Spell Name>" twice for cost of one casting.'},{id:"wlk_mm_arcane",name:"Ley: Arcane Spell",spCost:4,maxPurchases:1,description:'[3 Ley Points] Cast as "Arcane <spell name>" — changes delivery to Arcane. Can also change Spell Pool delivery to Arcane.'},{id:"wlk_mm_curse_wave",name:"Ley: Curse Wave",spCost:4,maxPurchases:1,description:'[3 Ley Points] Cast one of your Void curse spells as "Magic <spell name> Burst". Still costs the normal mana to cast.'},{id:"wlk_mm_weakening",name:"Weakening Pool",spCost:5,maxPurchases:1,description:'Spend 20 Spell Pool to generate a "Magic Weakness" effect.'},{id:"wlk_energy",name:"Energy (1-12)",spCost:1,maxPurchases:12,description:"Each purchase adds 1 Energy."},{id:"wlk_energy_high",name:"Energy (13-24)",spCost:2,maxPurchases:12,prerequisite:"12 Energy",description:"Each purchase adds 1 Energy at higher cost."},{id:"wlk_prec_2",name:"Precision +2",spCost:15,maxPurchases:1,description:"+2 damage from behind. Purchased per hand."},{id:"wlk_prec_4",name:"Precision +4",spCost:15,maxPurchases:1,prerequisite:"Precision +2",description:"Cumulative +4 precision damage (total)."},{id:"wlk_t_move_silent",name:"Technique: Move Silent",spCost:6,maxPurchases:1,prerequisite:"Shadow Meld",description:"[1 Energy] Passive. Move 15 steps while Hidden and remain Hidden; OR make one attack from Hide adding Surprise and remain Hidden."},{id:"wlk_t_blitz",name:"Technique: Blitz",spCost:4,maxPurchases:1,description:"[2 Energy] +5 Temporary Weapon Damage on next 4 weapon swings. Must be used on all following swings; each one swing hit or miss."},{id:"wlk_t_smoke_screen",name:"Technique: Smoke Screen",spCost:6,maxPurchases:1,description:'[3 Energy] Hands raised, "Smoke Screen" every few seconds for up to 30 seconds. Protects melee-range allies from outside ranged attacks. Requires concentration.'},{id:"wlk_t_conceal",name:"Technique: Conceal",spCost:6,maxPurchases:1,description:'[3 Energy] "Conceal!" — instantly become Hidden. Usable only in darkness or at marshal discretion. Cannot move (minor shifting OK). Up to 1 hour; leaving takes 5 counted action.'},{id:"wlk_t_escape",name:"Technique: Escape",spCost:6,maxPurchases:1,description:"[3 Energy] Instantly escape all movement-impairing and Binding effects (not Contain or Petrify). Can also free another via touch + 5 counted action."},{id:"wlk_t_avoid_trap",name:"Technique: Avoid Trap",spCost:2,maxPurchases:1,description:"[1 Energy] React to a trap or AOE as it goes off — negate effect and move to the edge of the area."},{id:"wlk_t_roll",name:"Technique: Roll",spCost:3,maxPurchases:1,description:"[2 Energy] Defend against a weapon or packet attack with numerical damage — half damage (rounded down), remove effect carriers."},{id:"wlk_t_group_meld",name:"Technique: Group Meld",spCost:6,maxPurchases:1,prerequisite:"Shadow Meld",description:"[4 Energy] Allow up to 10 allies within weapon reach to immediately enter Hide along with you (same Hide rules apply)."},{id:"wlk_shadow_meld",name:"Shadow Meld",spCost:5,maxPurchases:1,description:"Allows use of the Hide skill only in less-than-direct light. Foundation for Move Silent, Conceal (Warlock), and Group Meld."},{id:"wlk_darkness_ally",name:"Darkness' Ally",spCost:9,maxPurchases:1,description:"Persistent effect: immune to Blindness and Darkness effects. May receive additional narrative benefits in dark settings at plot discretion."},{id:"wlk_ritualism",name:"Ritualism",spCost:5,maxPurchases:1,description:"Use Ritual Scrolls to cast rituals (requires 4 ranks of appropriate Knowledge Area). Required to participate as secondary caster."},{id:"wlk_cancel_magic",name:"Cancel Magic",spCost:6,maxPurchases:1,description:"End the duration of any spell. Time based on duration: minutes = 1 min; hours = 10 min; days/lasting = 1 hour."},{id:"wlk_ka_common",name:"Knowledge Area (Common)",spCost:2,maxPurchases:5,description:"Purchase any common Knowledge Area without an instructor, up to 5 ranks each. Discounted cost for Warlocks."},{id:"wlk_ka_rare",name:"Knowledge Area (Rare)",spCost:2,maxPurchases:5,prerequisite:"See Skill Description",description:"Discounted Rare Knowledge Areas. Warlocks always count as having an instructor for Rare KA with plot approval."},{id:"wlk_void_familiar",name:"Void Familiar (Mastery)",spCost:4,maxPurchases:1,isAdvanced:!0,description:"Mastery. Shadow Familiar usable in shadowy light or darker only. In qualifying conditions: 1x Danger Sense per reset, simple tasks within 60ft while remaining in shadows (push button, retrieve/leave item <1lb). Pure shadow creature; moves through contiguous shadow. 2 actions per reset."},{id:"wlk_imbody_shadow",name:"Imbody the Shadow (Mastery)",spCost:6,maxPurchases:"unlimited",prerequisite:"Cap at 1 per 2 levels",isAdvanced:!0,description:"Mastery. 1x per reset per purchase (capped at 1 per 2 character levels). Become a shadow: move/run normally, pass through cracks. Immune to weapons and spells except Circle, Dispel, Light, Implosion, Wall of Force, Wizard Lock, Voice, and Arcane. Can only move in shade/shadows. Cannot speak; cannot use skills except Shadow Meld; cannot use abilities or items. Thumbs and forefingers in inverted triangle to maintain. Ends on dispel, light effect, or user choice."},{id:"wlk_dampen",name:"Dampen (Mastery)",spCost:4,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] Mastery. Weave shadows as a buffer: the next 2 offensive spells (with effects other than numerical damage) that hit you deal 5 Body damage instead of their effect."},{id:"wlk_dark_pact",name:"Dark Pact",spCost:20,maxPurchases:1,isAdvanced:!0,description:"Deepen your pact with beyond for additional power. Choose one: Pact of the Blade (Un-shatterable Spirit-linked weapon, can channel Shadow Spell Pool through it like Spellblade; +1 extra Precision & Focus purchase at 15 SP); Pact of Iron (1x/reset Damage Cap 5 for Encounter; can buy Heavy Armor proficiency for 7 SP); Pact of the Eye (1x/reset Danger Sense + True Sight; can buy Gifted Eye for 5 SP each); Pact of Knowledge (Tome with 3 Mage spells: 2 up to 3rd, 1 up to 6th level; can buy +20 mana at 1 SP/mana)."}],bard:[{id:"bard_precision_2",name:"Precision +2",spCost:15,maxPurchases:1,description:"+2 precision damage when attacking from behind. Purchased per hand; does not stack on two-handed weapons."},{id:"bard_precision_4",name:"Precision +4",spCost:15,maxPurchases:1,prerequisite:"Precision +2",description:"Cumulative +4 precision damage from behind (total)."},{id:"bard_precision_6",name:"Precision +6",spCost:15,maxPurchases:1,prerequisite:"Precision +4",description:"Cumulative +6 precision damage from behind (total). Class maximum."},{id:"bard_spell_pool_1",name:"Spell Pool I",spCost:5,maxPurchases:1,description:'25 points of healing or wind elemental damage. Delivered in 5-pt increments: "I summon X <healing|wind>". Cap: 5 per use.'},{id:"bard_spell_pool_2",name:"Spell Pool II",spCost:10,maxPurchases:1,prerequisite:"Spell Pool I",description:"+25 Spell Pool (total 50). Cap increases to 10 per use."},{id:"bard_hide",name:"Hide",spCost:6,maxPurchases:1,description:"Become Hidden from normal view. Must be next to a stationary object larger than you. 5-count to enter/exit. Can stay up to 1 hour without moving. Cannot be seen by anyone not actively searching."},{id:"bard_energy",name:"Energy (1-15)",spCost:1,maxPurchases:15,description:"Each purchase = 1 Energy. Bards max at 30 total Energy."},{id:"bard_energy_high",name:"Energy (16-30)",spCost:2,maxPurchases:15,prerequisite:"15 Energy",description:"Each purchase = 1 Energy at higher cost. Hard cap at 30."},{id:"bard_knowledge",name:"Knowledge (Area)",spCost:3,maxPurchases:"unlimited",description:"3 SP per rank. Bards may purchase any common Knowledge Area. The first Rare Knowledge may be self-taught up to rank 3."},{id:"bard_t_mobility",name:"Technique: Mobility",spCost:2,maxPurchases:1,description:"[1 Energy] Resist or remove slowing, Pin, Bind, and Binding Strike effects up to +4 Strength. Can also escape non-magical bindings."},{id:"bard_t_garrote",name:"Technique: Garrote",spCost:2,maxPurchases:1,description:'[1 Energy] Melee "Silence Strike" — Silences the target. If used immediately after Hide, call "Surprise Silence Strike". One swing hit or miss.'},{id:"bard_t_song_healing",name:"Technique: Song of Healing",spCost:2,maxPurchases:1,description:'[1 Energy] Performance: "I summon 5 Healing Burst" — heals nearby allies.'},{id:"bard_t_charm_strike",name:"Technique: Charm Strike",spCost:3,maxPurchases:1,description:'[2 Energy] Melee or ranged "Charm Strike" — Charms the target. One swing hit or miss.'},{id:"bard_t_roll",name:"Technique: Roll",spCost:3,maxPurchases:1,description:"[2 Energy] When hit by weapon or packet with a numerical damage value: take half damage (rounded down) and remove all effect carriers from the attack."},{id:"bard_t_song_purity",name:"Technique: Song of Purity",spCost:3,maxPurchases:1,description:'[2 Energy] Performance: "Purify Burst" — Purifies nearby allies (excluding performer).'},{id:"bard_t_dirge_command",name:"Technique: Dirge of Command",spCost:5,maxPurchases:1,description:'[3 Energy] "<Target> Voice Command" — Command effect on a target in line of sight.'},{id:"bard_t_escape",name:"Technique: Escape",spCost:5,maxPurchases:1,description:"[3 Energy] Instantly escape all movement-impairing and Binding effects (not Contain or Petrify). Can also be used on another target with a 5-count touch."},{id:"bard_t_sleep_strike",name:"Technique: Sleep Strike",spCost:5,maxPurchases:1,description:'[3 Energy] Melee or ranged "Sleep Strike" — Sleeps the target. One swing hit or miss.'},{id:"bard_t_dodge",name:"Technique: Dodge",spCost:7,maxPurchases:1,description:"[4 Energy] Negate one ranged weapon or packet-delivered attack that strikes you. Attack does not continue past you."},{id:"bard_t_song_resistance",name:"Technique: Song of Resistance",spCost:7,maxPurchases:1,description:'[4 Energy] Performance: "Barrier Burst" — grants Barrier to nearby allies (excluding performer). Lasts one Encounter or 5 minutes.'},{id:"bard_t_ambush",name:"Technique: Ambush",spCost:7,maxPurchases:1,description:'[4 Energy] Melee "Ambush" — renders target unconscious for 10 minutes. If used from behind: "Ambush Surprise" (very hard to avoid). Melee only.'},{id:"bard_dirge_demoralize",name:"Dirge of Demoralize",spCost:3,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:'[Daily] "<Target> Voice Weakness" — Weakness effect on a target in line of sight.'},{id:"bard_encore",name:"Encore",spCost:4,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] At the end of a Perform use, continue the performance. Song/Dirge repeats every 60 seconds as long as Concentration is maintained, up to 15 minutes."},{id:"bard_stash",name:"Stash",spCost:3,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:'[Daily] Hide an object up to 1 cubic foot for up to 3 hours. Tag item with "Stash" and time. Can be found by characters with Track rank 10+ on a Contested Roll vs 10 counter-tracking.'},{id:"bard_dirge_wipe_mind",name:"Dirge of Mind Wipe",spCost:3,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] 5-min performance: Forget (1 Hour) on target. Conscious targets may choose to ignore the effect."},{id:"bard_song_mental_focus",name:"Song of Mental Focus",spCost:3,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] Performance: up to 3 allies within melee range reduce their next counted action by 50% and gain Improved Concentration benefits. Must be used within 5 minutes. Cannot stack."},{id:"bard_allegro",name:"Allegro!",spCost:6,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:'[Daily] Performance: "Hasten Magic Burst" — all allies within melee range may deliver their next spell via Magic Delivery.'},{id:"bard_strike_a_chord",name:"Strike a Chord",spCost:8,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] Short performance: allows your party of up to 10 to bypass an encounter without engaging. Only works on creatures not immune to Mental Effects."},{id:"bard_t_song_guidance",name:"Technique: Song of Guidance",spCost:2,maxPurchases:1,isAdvanced:!0,description:"[1 Energy] Performance: grants up to 3 allies within melee range 1 Temporary Common Knowledge Point or +1 Bonus on next Contested Roll. Lasts 1 hour/module or until used."},{id:"bard_t_dirge_harm",name:"Technique: Dirge of Harm",spCost:2,maxPurchases:1,isAdvanced:!0,description:'[1 Energy] "<Target> Voice 10 Body" — 10 body damage to a living target in line of sight.'},{id:"bard_t_dirge_slow",name:"Technique: Dirge of Slow",spCost:3,maxPurchases:1,isAdvanced:!0,description:'[2 Energy] "<Target> Voice Slow" — Slow effect on a target in melee weapon range.'},{id:"bard_t_song_inspiration",name:"Technique: Song of Inspiration",spCost:3,maxPurchases:1,isAdvanced:!0,description:'[2 Energy] Performance: "Inspiration Burst" — Inspiration effect on nearby allies.'},{id:"bard_t_war_cry",name:"Technique: War Cry",spCost:5,maxPurchases:1,isAdvanced:!0,description:"[3 Energy] Standard War Cry effect on allies."},{id:"bard_t_song_fluidity",name:"Technique: Song of Fluidity",spCost:5,maxPurchases:1,isAdvanced:!0,description:"[4 Energy] Performance: up to 3 allies within melee range cast their next spell for 4 mana less (min 1) and via Magic Delivery. Lasts 1 hour or module."}],caller:[{id:"caller_mana",name:"Mana (1-100)",spCost:1,maxPurchases:50,manaPerPurchase:2,description:"Each purchase = 2 mana (1 SP per 2 mana). Mana fuels Nature spells. Levels 1-8 spells cost mana equal to their level."},{id:"caller_mana_high",name:"Mana (101-120)",spCost:1,maxPurchases:20,prerequisite:"Mana 100",description:"Each purchase = 1 mana at higher cost. Extends pool beyond 100."},{id:"caller_spell_1",name:"Spell: 1st Level",spCost:1,maxPurchases:"unlimited",description:"[1 Mana] Learn a Nature school spell of 1st level. Can be learned free from a scroll; SP cost only if self-teaching."},{id:"caller_spell_2",name:"Spell: 2nd Level",spCost:1,maxPurchases:"unlimited",description:"[2 Mana] Learn a Nature school spell of 2nd level."},{id:"caller_spell_3",name:"Spell: 3rd Level",spCost:1,maxPurchases:"unlimited",description:"[3 Mana] Learn a Nature school spell of 3rd level."},{id:"caller_spell_4",name:"Spell: 4th Level",spCost:1,maxPurchases:"unlimited",description:"[4 Mana] Learn a Nature school spell of 4th level."},{id:"caller_spell_5",name:"Spell: 5th Level",spCost:1,maxPurchases:"unlimited",description:"[5 Mana] Learn a Nature school spell of 5th level."},{id:"caller_spell_6",name:"Spell: 6th Level",spCost:1,maxPurchases:"unlimited",description:"[6 Mana] Learn a Nature school spell of 6th level."},{id:"caller_spell_7",name:"Spell: 7th Level",spCost:1,maxPurchases:"unlimited",description:"[7 Mana] Learn a Nature school spell of 7th level."},{id:"caller_spell_8",name:"Spell: 8th Level",spCost:1,maxPurchases:"unlimited",description:"[8 Mana] Learn a Nature school spell of 8th level."},{id:"caller_sp_1",name:"Spell Pool I",spCost:0,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:'Free. Grants 25 Spell Pool. Spell cap: 10 points per use. Delivers Lightning damage as "I summon X Lightning", packet delivered in 5-point increments.'},{id:"caller_sp_2",name:"Spell Pool II",spCost:5,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:"[5 SP] +25 Spell Pool, spell cap increases to 15 per use."},{id:"caller_sp_3",name:"Spell Pool III",spCost:10,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:"[10 SP] +25 Spell Pool, spell cap increases to 20 per use."},{id:"caller_sp_4",name:"Spell Pool IV",spCost:15,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:"[15 SP] +25 Spell Pool, spell cap increases to 25 per use."},{id:"caller_sp_5",name:"Spell Pool V",spCost:15,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:"[15 SP] +25 Spell Pool, spell cap increases to 30 per use."},{id:"caller_sp_6",name:"Spell Pool VI",spCost:15,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:"[15 SP] +25 Spell Pool, spell cap increases to 35 per use."},{id:"caller_ley",name:"Ley Point (1-20)",spCost:2,maxPurchases:20,prerequisite:"1 Mana",description:"Each purchase = 1 Ley Point. Max 20 total. Ley Points fuel Metamagic abilities."},{id:"caller_mm_hasten",name:"Metamagic: Hasten Spell",spCost:2,maxPurchases:1,description:'[1 Ley Point] Deliver spell without formal incant as "Magic <Spell Effect>". Bypasses Silence, speech restrictions, and confinement.'},{id:"caller_mm_penetrating",name:"Metamagic: Penetrating Spell",spCost:2,maxPurchases:1,description:'[1 Ley Point] Spell punches through armor — append "body" to incant. Can be applied to Spell Pool: one use of Penetrating affects next two Spell Pool applications.'},{id:"caller_mm_overload",name:"Metamagic: Overload",spCost:2,maxPurchases:1,description:"[1 Ley Point] Add the Critical Modifier to a single spell, or to the current Spell Pool."},{id:"caller_mm_aura_emulation",name:"Metamagic: Aura Emulation",spCost:2,maxPurchases:1,description:'[1 Ley Point] In response to being struck in melee, call "Magic Lightning Aura". Can use any of the four elemental flavors or Spirit.'},{id:"caller_mm_siphon",name:"Metamagic: Siphon Mana",spCost:3,maxPurchases:1,description:"[2 Ley Points] Drain Mana from a willing donor into your own Mana pool. May only transfer enough to return pool to full."},{id:"caller_mm_forked",name:"Metamagic: Forked Spell",spCost:3,maxPurchases:1,description:'[2 Ley Points] Split a spell to hit more targets. Add "Forked" to end of incant, then throw "Magic <Spell Name>" twice in succession for the cost of one casting.'},{id:"caller_mm_natural",name:"Metamagic: Natural Spell",spCost:3,maxPurchases:1,description:'[2 Ley Points] Cast as "Natural <Flavor> Effect>". Eliminates incant like Hasten but follows Natural delivery vector — stopped by shields, resisted with Resist Natural instead of Resist Magic.'},{id:"caller_mm_storm",name:"Metamagic: Storm",spCost:4,maxPurchases:1,description:'[3 Ley Points] Plant right foot and announce "Spell Storm: Lightning". While active: throw infinite packet attacks as "Magic 10 Lightning". Ends when unconscious, foot moves, or any other Active Skill is used.'},{id:"caller_mm_revitalize",name:"Metamagic: Revitalize",spCost:5,maxPurchases:1,description:"[1 Ley Point per 5 mana] Break down Ley Points into raw mana (1 LP = 5 mana). Can only replenish up to base mana pool per event. While using Revitalize, Ley Skills are unavailable for that event."},{id:"caller_chain_spell",name:"Chain Spell",spCost:6,maxPurchases:5,description:'Deliver one beneficial spell to one extra target per rank. With 5 ranks: cast on 6 total targets. Successive targets called as "Chain Spell <Effect Name>".'},{id:"caller_tongue",name:"Tongue of the Land",spCost:3,maxPurchases:1,description:"Speak with natural plants and rock formations. Ask 2 yes/no questions of a given natural creature."},{id:"caller_boost",name:"Boost Shifting",spCost:15,maxPurchases:1,description:"Enhances the Shifter class feature form: Base Strength increases to +6, Base Body increases to 40."},{id:"caller_cancel_magic",name:"Cancel Magic",spCost:10,maxPurchases:1,description:"End the duration of any spell encountered. Time based on duration: minutes = 1 min concentration; hours = 10 min; days/lasting = 1 hour."},{id:"caller_grasping_earth",name:"Grasping Earth",spCost:4,maxPurchases:1,prerequisite:"Daily",description:'[Daily] "All enemies in the sound of my voice Difficult Terrain".'},{id:"caller_dense_fog",name:"Dense Fog",spCost:8,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] Summon ultra-dense fog allowing party of up to 10 to move past an encounter without engaging. Only works on Modules set in natural terrain."},{id:"caller_create_grove",name:"Create Grove",spCost:5,maxPurchases:1,isAdvanced:!0,prerequisite:"Daily",description:"[Daily] 5 minutes concentration to imbue an area or small building with nature's power. For 5 days: Undead, Golems, Elementals, Fae, Abominations, and similar cannot enter. Requires green light phys-rep. Cannot stack with Wizard Lock."},{id:"caller_reincarnate",name:"Reincarnate",spCost:4,maxPurchases:"unlimited",isAdvanced:!0,prerequisite:"Daily",description:'[Daily per purchase] Touch a Dead target and count "I Reincarnate you 3, 2, 1". At the 4-minute dissipation mark, target begins a 1-minute count and is then restored to full Body Points. Once per reset per purchase.'}],mage:[{id:"mage_mana",name:"Mana (1-100)",spCost:1,maxPurchases:50,manaPerPurchase:2,description:"Each purchase = 2 mana (1 SP per 2 mana up to 100). Mana fuels spells; each spell costs mana equal to its level (levels 1-9)."},{id:"mage_mana_high",name:"Mana (101-120)",spCost:1,maxPurchases:20,prerequisite:"Mana 100",description:"Each purchase = 1 mana. Less efficient but extends pool beyond 100 up to 120."},{id:"mage_school_1",name:"1st School",spCost:0,maxPurchases:1,description:"Free. Choose first School of magic (e.g. Elemental, Spirit, Shadow). Starts with character level+1 spells from this school."},{id:"mage_school_2",name:"2nd School",spCost:10,maxPurchases:1,prerequisite:"1st School",description:"[10 SP] Choose a second School of magic. Starts with character level in spells from this school. Unlocks Reclamation class feature (requires both Spirit and Elemental)."},{id:"mage_spell_1",name:"Spell: 1st Level",spCost:1,maxPurchases:"unlimited",description:"[1 Mana] Learn a spell of 1st level. Free from a scroll; SP cost only if self-teaching."},{id:"mage_spell_2",name:"Spell: 2nd Level",spCost:1,maxPurchases:"unlimited",description:"[2 Mana] Learn a spell of 2nd level."},{id:"mage_spell_3",name:"Spell: 3rd Level",spCost:1,maxPurchases:"unlimited",description:"[3 Mana] Learn a spell of 3rd level."},{id:"mage_spell_4",name:"Spell: 4th Level",spCost:1,maxPurchases:"unlimited",description:"[4 Mana] Learn a spell of 4th level."},{id:"mage_spell_5",name:"Spell: 5th Level",spCost:1,maxPurchases:"unlimited",description:"[5 Mana] Learn a spell of 5th level."},{id:"mage_spell_6",name:"Spell: 6th Level",spCost:1,maxPurchases:"unlimited",description:"[6 Mana] Learn a spell of 6th level."},{id:"mage_spell_7",name:"Spell: 7th Level",spCost:1,maxPurchases:"unlimited",description:"[7 Mana] Learn a spell of 7th level."},{id:"mage_spell_8",name:"Spell: 8th Level",spCost:1,maxPurchases:"unlimited",description:"[8 Mana] Learn a spell of 8th level."},{id:"mage_spell_9",name:"Spell: 9th Level",spCost:1,maxPurchases:"unlimited",description:"[9 Mana] Learn a spell of 9th level."},{id:"mage_sp_1",name:"Spell Pool I",spCost:0,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:"Free. Grants 25 Spell Pool. Spell cap: 10 per use. Generates healing (Spirit) or elemental damage (Evocation) or school-specific flavors. Delivered in 5-point increments. Refreshes in 5 minutes or via 9th level Evocation."},{id:"mage_sp_2",name:"Spell Pool II",spCost:5,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:"[5 SP] +25 Spell Pool. Spell cap increases to 15 per use."},{id:"mage_sp_3",name:"Spell Pool III",spCost:10,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:"[10 SP] +25 Spell Pool. Spell cap increases to 20 per use."},{id:"mage_sp_4",name:"Spell Pool IV",spCost:15,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:"[15 SP] +25 Spell Pool. Spell cap increases to 25 per use."},{id:"mage_sp_5",name:"Spell Pool V",spCost:15,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:"[15 SP] +25 Spell Pool. Spell cap increases to 30 per use."},{id:"mage_sp_6",name:"Spell Pool VI",spCost:15,maxPurchases:1,affectsSpellPool:!0,spellPoolBonus:25,description:"[15 SP] +25 Spell Pool. Spell cap increases to 35 per use."},{id:"mage_ley",name:"Ley Point (1-20)",spCost:2,maxPurchases:20,prerequisite:"1 Mana",description:"Each purchase = 1 Ley Point. Max 20 total. Fuels Metamagic abilities."},{id:"mage_mm_hasten",name:"Metamagic: Hasten Spell",spCost:2,maxPurchases:1,description:'[1 Ley Point] Deliver spell without formal incant: "Magic <Spell Effect>". Bypasses Silence, speech restrictions, and confinement.'},{id:"mage_mm_natural",name:"Metamagic: Natural Spell",spCost:2,maxPurchases:1,description:'[2 Ley Points] Cast as "Natural <Flavor> <Effect>". Eliminates incant like Hasten but follows Natural delivery vector — stopped by shields, resisted with Resist Natural. Easier to stop but effective against magic-resistant creatures.'},{id:"mage_mm_penetrating",name:"Metamagic: Penetrating Spell",spCost:3,maxPurchases:1,description:'[2 Ley Points] Append "body" to incant — spell punches through armor. Can be applied to Spell Pool (cost paid per application). Allows Healing Pool to damage undead.'},{id:"mage_mm_arcane",name:"Metamagic: Arcane Spell",spCost:4,maxPurchases:1,description:'[3 Ley Points] "Arcane <Flavor> <Effect>" — delivers without incant or motion. Flavor is Elemental for Evocation or Spirit for Spirit effects. Defenses against Arcane are rare.'},{id:"mage_mm_revitalize",name:"Metamagic: Revitalize",spCost:5,maxPurchases:1,description:"[1 Ley Point per 5 mana] Break down Ley Points into raw mana (1 LP = 5 mana). Can only replenish up to base pool per event (max 120 extra mana). Using Revitalize makes Ley Skills unavailable for that event."},{id:"mage_mm_overload",name:"Metamagic: Overload",spCost:3,maxPurchases:1,description:"[2 Ley Points] Add the Critical tag to a single spell or current Spell Pool."},{id:"mage_mm_elemental",name:"Metamagic: Elemental Spell",spCost:3,maxPurchases:1,description:'[2 Ley Points] "Elemental <Flavor> <Effect>" — very powerful against opposing-element targets and creatures vulnerable to certain elements.'},{id:"mage_mm_mana_shield",name:"Metamagic: Mana Shield",spCost:10,maxPurchases:1,description:"[5 Ley Points] Cast before combat: translate mana points directly into armor points. Mana pool is reduced by amount spent until armor is depleted or dismissed. Cannot be reset or refitted."},{id:"mage_mm_siphon",name:"Metamagic: Siphon Mana",spCost:2,maxPurchases:1,description:"[1 Ley Point] Drain Mana from a willing donor into your own pool. May only transfer enough to return pool to full."},{id:"mage_mm_aura",name:"Metamagic: Aura Emulation",spCost:4,maxPurchases:1,description:'[1 Ley Point] In response to being struck in melee: "30 <Flavor> Aura". If this renders the attacker Helpless, the Mage does not take the effects of the strike. Can use any of the four elemental flavors or Spirit.'},{id:"mage_mm_storm",name:"Metamagic: Storm",spCost:5,maxPurchases:1,description:'[3 Ley Points] Plant right foot and announce "Spell Storm". While active: throw infinite packet attacks as "Magic 10 <Flavor>". Ends when unconscious, foot moves
